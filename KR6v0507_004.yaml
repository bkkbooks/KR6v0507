body:
  text: 住山釋畹荃嵩來輯集明州阿育王舍利塔圖讚有序釋迦如來於尸羅雙樹間入大涅槃茶毗得舍利無數人間天上龍宮三分供養有阿育王以大神力役諸鬼神碎七寶末成八萬四千塔盛如來舍利流布四洲時有耶舍尊者於指間放八萬四千光明天龍夜叉隨光所到處皆八吉祥六殊勝地乃安一塔震旦凡一十有九所阿育其一也其座非石非木非金非鐵高尺有四寸凡五層窗開四靣寶磬處中舍利如珠懸下坰於康熙己酉之冬道經四明特過鄮山瞻禮禮畢圍繞三匝忽見大如菽光如燈微紅黃色敬心益虔光成五綵相從者所見各各不一合十拜別歸途再瞻禮則舍利青色而微較前更異寺僧乞紀其事而并繪是圖因冗次未就倐忽六載今法鐘和尚主其席向與坰為方外交馳書來欲了此公案乃齋戒沐浴焚香敬寫所見之圖贅之以讚曰如來舍利八萬四千人間天上遍滿流傳毫端現瑞五采光鮮衆見不一各具識田如谷傳響如月印川我今瞻禮寶相莊嚴天龍呵護億萬斯年康熙甲寅之夏至日晉陵莊坰生題遊天童道經育王觀察琅槐杜漺古寺饒長煙隔嶺見蒼莾舍利傳阿育西晉迹乃昉明星覩雪山懸珠來罔象人言一尺塔光明彌百丈寶峯聚楞伽空谷走魍魎利賔與大權儼立同供養溪水皆西流湯湯出塵坱天童似兒孫群峯作兒襁松杉如此屋更出群峯上山僧導我前楖栗一條杖云令龍象伏斯言何滉𣾘天荒破義興密公更雄長妙音胡寂然使我失瞻仰風雨宿山房夜聞鐘磬響忽洗百年愁琉璃見精爽皎月忽一輪林杪寄真賞阿育王寺牧雲釋通門古稱殊勝地常放吉祥光法鼓分明繫佛身何處藏泉聲留妙喜閣記載奎章感昔穹碑在杖藜步夕陽草堂泰不華書鄮峯草堂額釋通門草堂依鄮峯篆額乃元人以一招提境而分上下鄰鐘聞當靜夜屐過自清晨差喜僧房僻投賢亦養神宿舍利塔下尋古碑杲堂李鄴嗣高文落千春得壽及山骨炯炯古塔下佛珠為日月老松願承蓋野苔不敢髮前潭有蟄龍霢雨頻浣刷幽氣巢巨靈風霆看出沒余適尋山門舊基瓦難垈支解歎佛身諸天坐茆蕝昔時鶴翎花劖根鬼火屈獨見尺草中臥立有碑碣肅若對古人束帶先上謁讀字先以手斷處終暫闕同遊幸異才精感足互發視畢久立煙三歎生悲咽百年各有生曾供石幾閲鄮峯草堂李鄴嗣此亦梵居耳其名曰草堂老僧無衲氣處士同行藏半扉辨客履引我坐藜床酬客訥言詞坐久喜其蠢自云山寺瘠脫粟不滿瓨烏鼠念僧貧留果充餱糧舊栽扶老竹新業藕花塘左有泉一潭木石養幽香緑煙常不散盥肺汲鴦漿勸客且坐此夜受星氣涼同董曉山周方人登阿育王寺塔𡵆公周斯盛霜晴白日高山影肅舍利新松三尺強遊雲無拘忌古殿委荒榛歎息飛白字寺有蕭子雲飛白字余嘗見之今失諸火曾塔失威儀孤空但一氣興廢理不齊焉測真宰意振衣登絶頂昔遊今復記玉几如故人堇山亦昆季田疇草色寒鳥聲落平地茫茫大化中容我一俯視陪𡵆公訪嵩巖上人題塔二首張鶯寺殘留古塔登眺喜同君風細聞樵語天空雁羣夕陽間啜茗高臥欲招雲野火燒龍象山僧何所云昨日迎君屐天寒到草廬山廚蔬芋薄野味雪霜餘茶灶添新火梅花慰索居欲知別後意試讀古人書過育王贈法鐘禪師遠菴釋本僼石芝地僻相知少玉几時過未厭頻塔影半峯橫落照鐘聲十里聽行人松堂雨霽月當戶妙喜泉香花及春最喜金輪疏正脈阮咸同病不知貧寄育王嵩巖和尚日休釋超寤月華皎如雪松色青于雲層霄墜霜葉幽響空階聞鴻雁西北來飛鳴各有羣一步一回顧飲啄滄江濆憶昔秦淮歸匆匆逢逆旅彼此若斷蓬飄飄不知處大火方西流家家弄機杼坐斯百憂中孤寒獨延佇願言室中燈分光照愁緒新纂鄞縣志邑令天門汪源澤距縣五十里阿育王山下昔周厲王時東天竺國有阿育王造塔八萬四千貯釋迦文佛真身舍利分布四洲遇八吉祥六殊勝地乃安一塔晉太康三年并州劉薩訶弋獵為生病瀕死見梵僧謂之曰汝罪重應入地獄宜往會稽有阿育王寶塔處頂禮得免既蘇出家名曰慧達遍求山澤忽聞此處地下鐘聲至心虔禮有塔從地湧出光明騰耀高一尺四寸廣七寸非金非石四靣窗虛內懸寶磬中綴舍利變現不可殫述此八萬四千塔之一也安帝義熙元年始構塔亭歲度二七僧守之宋元嘉二年文帝敕沙門道祐創增佛宇掘地得金合盛三舍利佛爪佛髮詔建浮圖三級函焉十二年曇摩密多建塔寺梁天監十五年華陽真人陶貞白先生宏景詣塔誓受五大戒普通三年武帝命建殿堂賜阿育王寺額蕭子雲手書飛白由是山亦以阿育王名大同六年帝令其孫越州守嶽陽王𧦴改浮圖五層繪藏帝及昭明太子像賜金五百兩造銅佛五百軀寫經論五百卷鑄鐵鼎以鎮四角尋蠲復其賦調給兵設營防衛陳宣帝度僧守塔如義熙數唐中宗遣使賜金下詔護持咸通間又度僧守之周顯德五年寺災宋初重建太宗嘗命通慧大師贊寧奉舍利入禁中供養大中祥符元年賜廣利額熙寧三年大覺禪師懷璉居之建宸奎閣藏仁宗偈頌御書五十三軸有真書飛白梵書三體御書團扇三柄英宗手詔一道知杭州軍州蘇軾撰記高宗賜塔號曰佛頂光明嘗迎至禁庭孝宗亦奉迎入大內御書妙勝之殿賜本寺皇子判府魏王愷造金塔一座奉安寶塔大慧禪師宗杲住持卓錫有泉曰妙喜張九成作銘其普香世界額則張祕閣即之所書也元至正十年住持悟光建承恩閣學士黃溍為記二十四年住持元輿重建下塔司農少卿危素撰記明洪武十五年定為育王禪寺稱天下禪宗五山之第五住持崇裕修復塔寺莊田翰林承旨宋濓為記永樂十四年殿圮住持宗正重建宏治間住持廣福重建玉几松堂少司空李堂記之正德十二年福又修上塔堂又為之記嘉靖四年山門燬福更重建考功郎豐坊記萬間住持傳瓶重建佛殿十九年真如軒有靈菊之異改軒名曰靈菊大司成戴洵為記崇禎間邑侯王章撰舍利殿記住持正理重修國朝順治五年住持行雪徙殿為西向未幾燬康熙十八年住持海覺重修舍利殿寺之東有鄮峯草堂元泰不華篆額去里許由大權洞而入有劉薩訶塔院院之南有墮星石石上隱隱有袈裟文相傳隨塔而墮云呈法公靈昭謝歸昌山寺深秋月清光透碧潭天空靈鳥下人靜毒龍參內熱思仙藕情多寄雪柑太行知失路望爾指京南冒雨過鄮峯訪法公留宿山房謝歸昌不到松堂三十年金沙玉几尚依然因沾法雨留春屐更借禪床穩客眠歸路未從來路得入山已勝出山緣遠公不禁陶公酒欲向池邊種白蓮賦得阿育王舍利寶塔謝秉昌鄮山壁立雙芙蓉極目扶桑海日紅會稽東來行不斷蒼茫萬里生秋風昔時育王降竺國捶碎寶玉琉璃空摩娑一夕驅神力刻畫萬變煩鬼工深碧似石亦非石古今耳目多盲聾白毫廣相遍大千獨留精氣凌蒼穹青山何處不藏骨如斯幻化不可窮玉几雲橫插天漢星辰丹碧臨珠宮崖生芝草千巖秀泉湧金沙萬壑通茫茫羣山煙霧裡俯看秋色青濛濛金峩雪竇指顧間太白侍雙童山深葉落迷行迹磬聲敲出白雲中我無曠懷翻百憂緣溪著屐叩遠公揮麈一一談宏箸如以寒氷語夏蟲老松頂禿枝墜地欲放不放光朦朧家弟維賢瞻在文國過玉几松堂止靜余不及從得排句十二韻謝秉昌寂寂茆堂俯夕陰離離花徑寄微吟青山到處望中遠長日思來別後深春色漂零知幾處浮雲來去亦何心只愁琢石終非玉強為炊沙未得金池上潛鱗思縱壑枝頭倦羽愛投林宗風暢出無南北山水蒼茫自古今偶喜間身觀去住重逢勝地記登臨爾時雨過松杉色盡日風還鐘磬音瓢水飲時知冷暖蓮花漏斷夢浮沉舟離古渡愁難越麈拂芒鞋足不禁野簌粗疏宜入饌溪茶香潔又頻斟何人淨掃孤峯石置我間彈一曲琴禮舍利集天竺語慰弘元盛佛塔一手掌舍利晶光芒沉水香和合製自阿育王末世作福田救苦騰神光露盤如棗葉五濁施清涼阿育王禮迦文舍利塔借山元璟塔樣古而奇高不滿一笏中虛涵舍利外質非木鐵仁王敕力士鎚搗衆香末其八萬四千神工一夜訖緬昔菩提場靈光照衣紱傾寫八斛珠天龍互分奪周哉我佛心遠布真丹國遂因劉薩訶平地忽湧出不夏綴碧瓜未秋𡸁朱橘或看鳳凰卵又變玻璃月智者領復怡狂者反自慝病者霍然起枯者勃然茁嗟嗟三界生愚癡難解脫大海一浮漚獲覩此奇特余來償夙願戊寅之人日足履八吉祥手炷栴檀𭽽睨而窺塔戶圓吐摩尼活似定𨚫不定欲綴那可綴回首蔚藍天紫雲䨱山額放光松元璟曠觀天地間無如此松好亭亭長百圍清露滴昏曉形同麈尾𡸁群枝匝地掃磊砢節森森挺特若龍爪狂風西北來濤聲生樹杪卷舒自有情歲寒終始保舍利曾分真光騰燭海島欲放而不放其光徹四表大者如車輪小者如鶉鷸倣佛清秋時衆星羅月皎磊落懸玻璃參差綴瑪瑙或看火齊明又同日初照覩者歎奇哉異論各紛擾如旱得甘霖如貧獲至寶憂者快然欣壅者剨然剖吁嗟斯輩人識見何其小我佛萬德尊略示一塵藐約謝子維賢同遊阿育豫因事入白峯謝見候屢日不值及豫至寺謝已先還慨然有賦兼呈法公西溟薑宸英喜雨題詩古寺中海天蕭颯萬山空秋風竹徑來求仲春草池塘憶謝公捲幔牽蘿驚戶碧臨階滴葉妬魚紅誰將清磬敲殘暑愁見平皋落暮鴻春日禮育王舍利詩以志勝陳其愚四十九年不説説一朝隨願示寰中須知有感光斯現能到無心象亦空仰靣晶瑩難指月當機璀璨快如風由來此地稱多寶漫把王宮比梵宮秋遠和尚繼席育王里言奉寄邵似歐每歎乾坤幾陸沈尚留吾道在山林人間不盡千秋業世外初傳一片心鐘鼓聲聞新法座薜蘿春老舊知音相逢莫道來何晚飛錫峯頭待鶴臨送法老和尚還掃花居謝景昌玉几松堂古高賢卓錫居雙瞳秋水碧相識草年餘昔時曾囑我層雲坐疊砠抱膝不如轉至今猶踟躇臨平湖岸左誅茅好結廬睽違五裘葛頑石猶如初杖履今還山湖雲滿衣裾見靣各歡喜步趨多安舒如何才信宿又報乘藍輿草草一幅紙忙忙隨手書錢塘潮汐穩時時望雙魚育王移山梅一本於樹滋堂雨中分賦二首瞻在謝兆昌玉堂疏影至移植向珠宮花發元無異根深自不同離披承朔雪剪拂待春風聽盡支公法香浮細雨中著書時掩戶庭草不須刪老翰抽春思蒼苔古顏角吹千片落鳥立一枝間坐使成陰日無忘是故山寄法公和尚二首謝兆昌公案當機等夙塵不須一一又重陳頻年𨚫病終無術今夜傷秋只此身籠有參苓甘得苦性同薑桂老逾辛繩牀竹簟支清夢何日溪頭採白蘋松菊猶存晝掩扉繩床枯坐自如如塵容此日看將老夙習頻年苦未除望遠只因山有石音疏不為水無魚携笻且過通宵話待剪蓴絲雨後蔬呈法公謝秉昌講席依松檜經年盡掩關山高門自峻僧定客俱間城市傳龍鉢氷霜映玉顏春深理雙屐溪上聽潺湲遊育王贈東堂法老和尚用豐考功原韻裘璉閣雨山雲濕不流招尋古寺坐初秋千峯樹色香臺繞萬里煙嵐臥閣收碑碣依然題魏晉林泉何處問巢由虎溪會有高人住未卜他年白社休重晤法和尚於蛟城二首邵似歐烏飛兔走幾升沈一坐煙霞歲月深千載名山傳舍利老人南極照祗林龍藏鉢裏施慈雨鳥向枝頭説梵音正值芳菲時節好春風花柳印禪心一天春色滿滄洲寂歷空山作臥遊古殿罘罳懸麗日百年身世等虛舟蒼茫水接扶桑外縹眇峯高故國秋吳起烽煙人自老寸心早被白雲留法公自都門歸鄮峯𨚫寄邵似歐阿育王寺瞻仰舍利孝亷匡雲溫應嶠智珠一箇中分妙勝之宮寶氣殷靜比天心涵夜籟爛如初日照晴雲大千界內幾摩蕩五十年來始見聞迸出儂光許謁佛佛光何處不繽紛寄育王法老和尚溫應嶠芒鞋竹簥漫追尋丈室清宵許細吟坐有名書不用笈山無俗客自然深雨花錯落天香界珠月圓明古佛心別際斯須還握手虎溪千載一知音雨中過鄮山宿玉几松堂謝秉昌舟停谷口藉笻扶為叩支公講席孤滿壑寒雲迷折屐一灣流水入香厨客依木榻心俱寂僧定茆廬偈亦無雨細花深歸未得杜鵑何事又相呼懷秋遠和尚溫應嶠登峯已震青獅吼戞竹還聞丹鳳鳴一壑溪雲盤玉案三更茶火落松聲人如瘦菊經秋韻詩比幽蘭入夢清慚愧論莊非逸少讓將支遁獨成名過育王晤遠公和尚二首邵似歐古來名勝地多半屬高僧人靜風斯上山空道自矜金沙澄一片玉几碧千層別有悠然處傳心不用燈得共高人語兼嘗新笋羹淡交當世外別久覺情生古殿雲棲白四山雨過青長松千百樹謖謖落濤聲過鄮峯呈遠公和尚謝歸昌群峯衆壑衛珠宮玉女金童法座中時許毒龍來聽鼓更看頑石自聞鐘浮圖夜氣連雲白舍利晨光帶日紅誰謂無生難可叩清泉一勺使心空風流曾許挹支公此夕看山葉未紅携手過溪明月下依然三笑一堂中重看玉几鶴飛來一道松風萬丈開𨚫笑陶公揮不去也隨群屐印蒼苔春日再訪遠公邵似歐卓錫名山二十年曹溪滴水有真傳光從舍利珠中見人結春風世外緣煮栗烹茶清客供栽蘭種竹小窗前殷勤握手臨岐別玉几金沙夕照天山居得秋遠和尚書漫賦二首謝師昌住山人境絶禪客遠招呼倚几人如玉放光松有珠索書兔頴脫覔句龜腸枯何以酬高德真成我失吾好報遠公知秋來得疾奇老莊讀愈放沮溺近難師斷續風蟬咽飄零霜葉稀枕中合璧在驅豎問良醫遊阿育王寺雪汀張士塤舍利莊嚴殿山崖半嶺通門闌千嶂木籬繞一溪風古塔凌深霧殘碑照晚虹老僧茶話久爐燼撥灰紅秋杪從天童過宿育王用歐陽公憶滁州幽谷韻呈秋遠和尚東門李暾舍舟望近育王峯靣醉村醪映夕紅未暇敲門通竹徑先來選石坐松風今宵夢斷清關路往日詩留白髮翁余初謁法公公出示近稿遂爾信宿十八里尋楓柏色江南應入畫圖中前題韞山張錫璁又離太白幾重峯寒夜圍爐撥火紅好客難回謝傅屐蛟川謝氏諸公方出山高僧別具晉人風雪堂晚步携禪衲石鼎聯吟恕病翁公以病後不能久坐不是情深思訪戴次日訂訪謝北溟肯拋紅葉滿山中前題潮則等月秋老晴光燦碧峯到來星聚一燈紅自憐病骨歸舟客又挹清芬入座風棲息尚無瓢挂地支持賴有𩬆頺翁收藏恰共當今日冷沸松濤夜壑中玉几峯三首住山秋遠碧當軒青玉案琢出自天然不羡雕鏤巧深期朴厚全平懷容木石舒卷任雲煙誥牘何年事千秋啓聖賢仙人書何年仙子筆名姓竟翛然或作楷書法還疑草聖傳似非狂李白應擬醉張顛墨妙超神化為龍飛上天般若塔窣堵居峯頂登臨眼更寬海舟浮若芥江樹藹如攢吳會雲中隱荊湘水澤寒遙瞻天竺遠指度桑乾放光松歌北溟謝緒章放光松爾從舍利出世現神通典午訖今千二百載餘桑海變故撇如電火一睫紅爾獨岩阿藏首尾側身倒地不與徂徠百尺爭奇雄縱有匠石過弗顧豈因佛力呵護不敢攻佛頂光明今杳矣留爾長鎮兹山弗作世眼玩好供百年之內自有濟世賢聖逢吁嗟乎放光松送秋公法姪和尚歸鄮峯大梅超寤掃卻微塵肅小樓翦蔬粗糲為君留出門宿雨收山腳一路啼鶯坐樹頭九曲明珠無異纇五文錦繡莫輕投松堂老叟如相問報道催耕又飯牛過育王呈秋遠和尚二首李暾百尺虬龍匝地𡸁我來春老坐成癡看花枝上初黃候落日山頭正淡時領略四時都有態揣摩草載竟無詩羡公朝夕蒲團對定有人間絶妙辭斗室窗開峭壁臨海棠嬌媚襯池陰空山寂寂鼓鐘靜好鳥交交花木深月白風清千古樂鳶飛魚躍一生心夢魂久戀眠窩穩幾得烹茶共苦吟小育王感懷三首秋遠碧春風幾度碧峯前佇立荒臺思悄然數里鐘聲沉澗壑半空樓閣入寒煙松門石馬非當日谷口間雲似舊年遙見聖朝多雨露何時宸眷及林泉七佛潭曾聞善世浴寒流徑轉斜陽訊所由淺碧一泓餘往迹俱胝七佛窅難求風回岸谷吟黃葉月冷松杉照石樓悵望普通年外事峩峩塔影在峯頭袈裟石親承密記覲迦文靈塔東安息世紛風雨不追湘燕隊煙霞肯混白羊羣定心自許同磐石道力誰疑欲墮雲應是流沙飛渡促水田衣濕曬晴曛春日過鄮峯同省齋和尚斯敏法姪坐雨兼懷秋遠法姪超寤五年不見干戈後相對須眉老歲華夜雨半牀聽玉几春泉一鼎試金沙留題且倩烏絲紙有約還來蠶豆花跋燭二更同小阮翻思秋遠隔天涯寄育王嵩來上人二首翠峯張兆林交必真禪日喜𣸸從儒學佛得才兼縈龍妙墨從心正吐鳳佳吟信口占如此天資深足重敢將學力進尤嚴請看何處開圖畫峯有雲闌露翠尖插藜望望拂蒼髯神往名藍迹又淹山水相期緣自合應酬不了老何堪春過可惜忘尋隱夏至其如畏觸炎今訂木樨香裏待掃將玉几闡楞嚴從天童過育王依韻奉酬嵩來上人奉化邑令彭祖訓白雲深處踏青莎鄮嶺邀人携杖過只愛育王山色好得瞻舍利寶光多踈籬繁蕊開罌粟斗室濃陰挂薜蘿極感皎然貺新句楚傖偏未解騷歌贈嵩來上人進士翰卿周鴻憲造物無窮期吾生有涯涘安得素心人落落乾坤裏自與吾師遊往復無倦已塵緣都棄捐百里如尺咫吾師方妙年薪傳接宗旨一塢白雲深三乘演無始淡寂寄高真名言掃粳粃不獨透元關而且貫經史揮毫吐雲煙價貴洛陽紙四明多才人氣誼芬蘭芷相賞在性情吾道原如此我今聆清談拂座春風起願言訂同心長松共徙倚嵩公以詩見贈次韻奉答翁山張美確漫説吾儒一畝宮松篁不欠此林中交遊聚首堇山雨耕讀傳家古邑風潦到襟懷隨世別蹉跎歲月與誰同青尊猶自餘千日白髮奚須較五窮劍氣無從瞻北斗歌聲有待學南翁欣叨方外饒佳句蓮社初開杖履通偕董天池不磷遊阿育王寺宿嵩公房羲琴范桐城市苦塵氛名藍生遠念言遊阿育王解榜春流贍及岸行行日漸斜三人迤𨓦踏晴沙紺殿依稀雲際出高僧入定紛天花贊公禪房何窈窕謀面不愁佳話少朗哦成帙快新詩聲在萬山松樹杪午膳欣參白版師出釜茶香新緑繞淹留十載不為多歸去杜鵑呼奈何玉几松堂同李東門看雨西郭萬承勳看雲直上最高岑雨腳追人自遠林便恐虬松真欲化豈知霖雨本無心頻移客座侵簷淺忽隔山門湧水深夜臥清涼極樂國放光有樹不須尋前題東門李暾共憑玉几望幽岑雲滿前村風滿林疾雨四簷消暑氣飛泉百道活禪心乍看但覺天將合久坐渾疑夜已深我若遲來公早出定教魂夢兩相尋鄮峯草堂二首住山嵩來荃蒼苔路澀草堂偏幽勝還能似輞川繞屋已培新竹樹近園重贖舊山田其時傾廢殆盡山園竹樹盡易他主僅存老屋敗垣好事者請余攝其院事重為修葺秋來月色生峯頂坐久花陰到檻前小閣低牀燈火裏一簾清影夜深禪間身隨處足生涯別有東廬又是家藜榻暖鋪香糯草蒙泉秋養水芝花水芝荷也買山兼愛雲藏石種竹還期笋出芽亂石門墻行路窄薜蘿青挽舊袈裟明州阿育王山續志第十五卷目録舍利懴儀序釋成皎同人由天童至阿育王寺董胡駿前題吳育賢前題李暾放光松董胡駿放光松吳育賢放光松李暾入育王寺何鉽陪葉芬洲中鎮自太白過育王二首錢際盛涌現巖十景玉几峯金沙井放光松赤堇峯佛迹亭鬼谷祠望海亭妙喜泉袈裟石釋畹荃禮舍利塔黃應熊禮舍利塔釋成衡放光松李寶默和李拙園寅長原韻黃應熊松壇銘并序釋畹荃放光松釋元煌放光松釋元晟放光松釋元訪放光松釋通禮放光松釋興源放光松釋成傳放光松釋畹荃將至武彝留別嵩公和尚二首釋元煌拾翠樓落成釋畹荃和拾翠樓原韻李暾和拾翠樓原韻張珽和拾翠樓原韻黃應熊和拾翠樓原韻陳汝登和拾翠樓原韻李世法和拾翠樓原韻陳昌運和拾翠樓原韻錢際盛和拾翠樓原韻周式雅登拾翠樓四首李暾登拾翠樓適黃海門同寅至限韻鄭大德和鄭改之寅長韻黃應熊和前韻錢際盛和前韻陳汝登和前韻薛泰友贈拾翠樓主人鄭大德奉和鄭改之寅長原韻黃應熊奉和原韻陳汝登奉和原韻錢際盛娑羅閣落成手植花草寄友人釋畹荃娑羅閣跋鄭羽逵娑羅閣記寄育王嵩公和尚五首謝誾祚冒雨遊阿育王寺三首李昌泉禮塔出山留別嵩來和尚釋實賢贈育王嵩侄和尚釋明哲春日過訪嵩公和尚二首沈瀾秋日寄嵩公二首范核唐阿育王寺田碑跋朱彝尊承恩堂記謝誾祚乾隆十六年賜紫沙門持荃恭紀乾隆二十二年賜紫沙門持荃恭紀承恩堂紀事奉賀嵩公大和尚薛泰友立秋後遊阿育王寺奉贈嵩來禪師宋鑒戊寅暢月小詩奉贈嵩來大和尚兼續秋水間房集蔡其發
