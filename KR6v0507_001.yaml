body:
  text: 住山釋畹荃嵩來輯集宋太宗皇帝御贊舍利功成積刦印文端不是南山得恐難眼覩數重金色潤手攀一片玉光寒煉時百火精神透藏處千年瑩彩完定果熏修真秘密正心莫作等閒看宋英宗皇帝賜懷璉手詔大覺禪師懷璉受先帝聖眷累賜宸章屢貢誠懇乞歸林下今從所請俾遂閒心凡經過小可菴院任性住持或十方禪林不得抑逼堅請奉使道中寄育王山長老常坦王安石道人少賈海上遊海舶破散身波浮抱金滿篋人所寄吹簸偶得還中州嬴身歸來不受報秪取斗酒相獻酬歡娛慈母終一世脫棄妻子藏岩幽蒼煙寥寥池水漫白玉菡蓞吹高秋夜然柏子煮山藥憶此東望無時休塞垣春枯積雪溜沙礫盛怒黃雲愁五更疋馬隨雁起想見郊郭花稠稠百年誇奪終一邱世間滿眼真悠悠寄聲萬里心綢繆莫道異趣無相求與育王大覺璉禪師蘇軾奉別一十五年幾一世矣會見無時此懷可知到此日欲奉書因循至今辱書具審起居安穩南方耆舊彫落惟明有老師杭有辯才道俗所共依仰葢一時盛事此來得從辯才游老病昏塞頗有所警發恨不得見老師更與鑽磨也歲莫山中寒苦千萬為眾自重戲贈育王虚白長老王安石白雲山頂病禪師昔日公卿各贈詩行盡四方年八十𨚫歸荒寺有誰知與大覺禪師璉公書蘇軾要作宸奎閣碑謹以撰成衰朽廢學不知堪上石否見參寥說禪師出京日英廟賜手詔其畧云任性住持者不知果有否如有切請錄示全文欲添入此一節切望子細錄到即便添入仍大字寫一本付侍者賫歸上石也惟速為妙碑上別作一碑首如唐以前制度刻寺額十五字仍刻二龍夾之碑身上更不寫題目自古制如此最後方寫年月撰銜姓名更不用著立石人及在任人名銜此乃近世俗氣極不典也下為龜趺承之請令知事僧依此寄大覺禪師二首王安石山木悲鳴水怒流百蟲專夜思高秋道人方丈應無夢想復長吟擬惠休單已安那示入禪草堂難望故依然山今歲莫終岑寂人更天寒最靜便隱跡亦知甘自足平心豈吝慰相憐所聞不到荊門耳人老采新又一年舍利塔記畧蘇軾大雄氏真身舍利乃戒定慧熏修所成其滅後百年周厲王時東天竺國有阿育王造寶塔八萬四千貯釋迦文佛真身舍利請邪舍尊者放光遣神光所止處布于天下禹貢荒服之內凡十九所四明鄮山當其一自晉迨今歴千九十七年為阿育王寺太康中獵人劉薩訶病死見梵僧指往會稽舍利塔處懴悔乃甦因與僧惠連至會稽竭誠徧禱一夕聞鐘聲隱隱響地中又二宿聲漸近遲明寶塔湧出地上諸天花雨萬姓懽欣塔高尺有四寸廣七寸體質殊異莫辨其何物中懸小金磬覆如葢徑可寸許舍利綴于磬之中圜轉不定初見如水晶珠大如芡實已如彈丸已加大如瓜如車輪五色變幻光彩射目不可迫視或見如大桐子白色或見如椒荳大青色或無所見由晉梁唐宋皆有名刻姑摭其畧云與大覺禪師璉公蘇軾人至辱書伏承法候安裕傾向傾向昨奉聞欲捨禪月羅漢非有他也先君愛此畵私心以為捨施莫如捨所甚愛而先君所與厚善者莫如公又此畵頗以靈異累有所覺于夢寐不欲盡談嫌涉怪爾以此不欲俗家收藏意只如此而來書乃見疑欲換金小羅漢開書不覺失笑近世士風薄惡動有可疑不謂世外之人猶復爾也請勿復談此某此乏人可令賫去兵卒之類又不足分付告吾師差一謹幹小師齎籠仗來迎取併古佛一軸亦同捨也錢塘景物樂之忘歸舍弟今自陳州得替當授東南幕官冬初恐到此亦未甚的詩筆計益老強或借得數首一觀良幸到此亦有拙惡百十首閒暇當錄寄也大覺鼎銘蘇軾樂全先生遺我鼎𤮧我復以餉大覺老禪在昔宋魯取之以兵書曰郜鼎以器從名樂全東坡與之以義書曰大覺之鼎以名從器挹山之泉烹以其薪以苦以甘咨爾學人與趙得麟書蘇軾明守一書託為致之育王大覺禪師仁廟舊所禮遇嘗見御筆賜偈頌其畧云伏覩大覺禪師其敬之如此今聞其困于小人之言幾不安其居可歎可歎太守聰明老成必能安全之願公因語款曲一言正使凡僧猶當以仁廟之故加禮而况其人道德文彩雅重一時此老今年八十二若不安全當使何往恐朝廷聞之亦未必喜也軾方與撰宸奎閣記旦夕附去公若見此老且為致意祭大覺禪師蘇軾維年月日具位蘇軾謹以香茶蔬菓致奠故大覺禪師器之之靈於穆仁祖威神在天山陵之藏二十九年當時遺老存者幾人矧如禪師方外之臣頌詩往來月璧星珠昭囘之光下燭海隅昔本無生今亦無滅人懷昭陵涕泗哽咽我在壯歲屢親法筵饋奠示別豈免悽然尚饗遊育王寺二首樓异余傾年同舒公中丞出東城馭小舟至寶幢市中以藍輿至行未數里入阿育王山謁大覺禪師留蒙堂十有五日璉時已年老不復作詩但夜坐禪談詩皆余倡而舒公和也澗底無塵猿捉月雲間有路客吹簫詩禪可但𩀱能妙人境須知兩已超塵世光陰自若川鄮山遺塔故依然平生有意蓮花社此地相逢柏子禪百紙雲烟瞻御墨一奩氷玉翫靈泉無端尚省來時路忽似溪翁轉釣船和樓試可遊育王二首舒亶參天松栢綠陰陰古佛巖前一路深猿鳥不驚如有舊雲山相對自無心數泓寒水雲藏雨十里輕沙地布金杖屨更知非世境上方日日海潮音由來去住不相關嬴得隨緣到處閒笑出海雲飛一錫行分江月過千山微言定許誰人叩勝事偏于俗士慳咫尺蒙堂隔霄壤城東搔首只空還凡賡酬五十餘首集中往往有不錄者迨至三十四年余守鄉邦遵承御筆賜鎮水神符於定川之寶山海洋有巨魚出迎高數丈其大如船鱗角照日觀者千餘人事聞朝廷日遊廣利宮謁淵靈祠躬禮三井遍歴山川棟宇一一如昨追歎三賢之不見欲之天童以雨作下山宣和庚子仲春四日鄮山樓异試可題于明月堂次韻知郡學士錢公遊育王山胡宗愈使節行春入鄮山老農扶杖倚山看長松偃地蛟龍臥古殿摩空星斗寒醉裏雲烟生酒靣吟餘風月動毫端病來不得陪觴豆一覽新詩意思寬佛迹盤紆三四里綠蘿緣石樹交陰老僧踞坐形容古野雉馴飛歲月深名利不休空白日塵埃無路到幽林擬投簮紱棲禪去囘首難忘濟物心伯父資政簡修公嘉祐戊戌鄉薦第一明年禮部奏名天子臨軒皆擢第二調奉國軍節度推官和知郡學士遊育王山詩即紫微舍人錢公君倚也後五十六年慎脩權領郡事刊刻于石政和四年冬至前三日姪朝請郎通判台州權管勾明州軍州事慎脩書呈妙喜學士履齋吳潛不是心兮不是佛通身一串金鎖骨趙州叅見老南泉解道鎮州出蘿蔔夏日遊玉几山謝翱曳舟來山中出郭稅吾駕獨慕欣眾騰晨發乃及夜豈無城中山愛此是幽野橫陳玉几峰隱䕶碧殿瓦并州古男子禮塔于兹舍而我飲冰人猶為內熱者擬携桃枝笙舒卷得餉暇明席織海草因之一枕藉冷風吹雪空相與坐其下寄育王賢上人謝翱余今秪老身從昔少埃塵失蜀年為客居山石作隣南遊宗竺法西路問巴人開戶藤花落多浮茗椀春題鄮嶺接待佛照禪師德光玉几峯高難措足行人多向半途休無棲泊處開門戶個个教伊到地頭景德靈隱禪寺住持佛照禪師德光札子奏臣一介壞衲尸素叢林幸際明時重霑恩渥頃從台州光孝奉聖㫖令灑掃靈隱道塲飄忽已及五年屢對龍光欵親聖訓自惟人才卑陋識見單微徼冐遭逢一至於此舉今並古實所罕聞惟仁宗朝大覺禪師懷璉道契宸衷曲蒙異睠續以年老丐還東州佳處以安晚節慶遇一時輝映千載仰惟陛下天資頴悟聖德同明其厚德深仁足以比蹤仁祖而神機道妙竊擬過焉臣之孱瑣不材不及大覺遠甚況今侵尋衰老豈宜久居輦寺深欲乞歸林下力行此道以報鴻私竊覩明州阿育王山廣利禪寺見缺住持本寺乃奉安釋迦舍利寶塔區處邱壑幽邃可與衲子安禪辦道臣愚敢望聖慈矜憐草芥特與前去補處庶幾與懷璉遭遇仁廟時事異世同轍臣敢不益勵操修精廑香火祈永天算以效螻蟻之誠冐犯雷霆屏息候命臣無任戰栗震懼之至進止四月二十九日三省同奉聖㫖依所乞右札付佛照禪師德光淳熙七年五月立石于阿育王山佛照光禪師塔銘少傅觀文殿大學士致仕益國公周必大撰法不孤起道不虛行續佛慧命必有其人其人為誰佛照禪師是已師諱德光姓彭氏臨江軍新喻縣人曾祖厶祖堯訓父術皆樂施喜釋氏嘗籍鄉里貧戶計口給錢宣和辛丑歲母袁氏夢異僧入室有孕生師骨相奇龐伏犀貫頂袁州木平山有妙應大師伯華者善相謂此子他時空門梁棟也初入小學誦書十行俱下父母既亡依伯父循以居一日延僧追修師視佛書若素習然紹興辛酉大慧禪師宗杲南遷過邑師年二十一望見曰此古佛也吾安得事之自是有意出家後二年入光化禪院受業於足菴普吉研究宗㫖日以精進吉還閩命從月菴善果於東禪服勤三年是時妙湛佛心圓覺乾元越山諸禪剎名僧相望師一一咨叩聞江西百丈道震嚴冷寶峯擇明峭㧞具入其室一日見饒州天寧應菴曇華送化主頌歎曰此真臨濟種草亟往依之雖箭鋒相直然礙膺未决復從果老於溈山果入寂還江西謁典牛天遊於雲岩見卍菴道顏於圓通會曇華移廬山之東林婺州之𩀱林師皆從之丙子歲聞大慧住四明阿育王山喜曰緣法在兹矣已而果大徹慧示以讚畧曰有德必有光其光無間隔名實要相稱非青黃赤白歸徑山明月堂奉事益䖍遇其說法座下爭執筆抄錄師一歴耳根終身不忘有問輙舉其慧解葢天資也慧入寂分座仰山乾道丁亥台守李侍郎浩延住鴻福閱五年徙光孝郡城大火寺亦焚蕩師念災餘財施必艱航海過泉州人兢喜捨厚載而歸殿宇一新師號拙菴曰吾平生多得拙力孝宗皇帝雅聞其名淳熙三年春詔開堂靈隱寺遺中使賜香是冬召出觀堂留五晝夜數問佛法大意師數奏直截上大悅賜佛照禪師之號贈御頌明年再對進宗門直指以都下勞應接丐閑山林七年夏上用仁宗待大覺禪師懷璉故事亦以育王處之逮移御重華趣令入覲漏下十刻乃退紹熙四年改涖徑山師力辭上曰欲時相見耳慶元元年許還育王歸老東菴盡鬻賜賚物直數萬緡之錢置田歲增穀五千石以助常住費詳見陸待制遊記中師常曰佛經有大報恩七篇謂釋子當由孝以極其業乃即水陸堂東偏設位歲時祀其祖禰云嘉泰三年仲春忽語曰吾將行矣三月十七日手寫遺表及貽書常所厚者二十日晨興集眾敘別斂衣收足說偈而逝三日入龕容貌如生塔全身於東菴之後請諡於朝勅特賜普慧宗覺大禪師塔名圜鑒僧臘六十夏嗣法遍滿四方得度者一百二十餘人名公貴卿多從師遊東海國人往往望風皈敬初璉六十歲自汴京來育王壽八十三師始終適同兹其異也八月侍者正玸持遺書來謂先師與公幸接鄉隣同受阜陵異知以塔銘見屬其行實則同里兵部章侍郎頴為之余聞時節因緣針芥啐啄從上諸聖不能強為喻筏刻舟徒增我慢又况對御法語世已流布得道原流接物機要叢林門弟各存語錄姑敘住世大畧如此銘曰我聞萬生各具物性人有未見見或未盡偉哉光公宿習戒定頓入悟門遂傳心印福慧兩足行解兼進巍巍孝宗見聖由聖與師晤言謂發深省晚歸東菴不倦接引八十三年報緣已竟勿云鏡明昔現今隱一物本無何用照映勿云谷虛有叩隨應十方皆空何論銷殞摘葉拈花擊風捕影持問塔中解顏微哂西湖志餘云慶元府阿育王寺有舍利塔殿宋嘉熙中頺圮非得萬緡不可修有一行童發願募緣修造曰今惟八大王榮邸最有力持疏勸緣大王止題一千緡行童歸不能成乃斷臂流血不止而死其事莫有言者度宗于庚子歲八大王府中降生日夜啼哭不止一乳母抱之行廊廡下入小閣見粘一塔影忽然而笑去而復顧揭塔影置其手中遂不復啼哭乳母以告大王王忽悟題疏事下本寺訪之言行童以某年月日死正度宗生之日也大王因捐貲以成其塔殿度宗取入宮時理宗夢有告之者曰此十年太平天子也遂立為太子云云育王祭無極和尚無文燦嘉泰開禧間先空叟唱江西之學于玉几師是時年盛氣銳振勵其間如文遠之在趙州躭源之在南陽也嗟夫空叟墓田桂松參天矣國中大剎布武而昇方行吳越發揮家學屬意于師者極不淺也爛遺墨之鮮明羞眾香之芳烈塔中有靈幾何不愴然動色也哉傷今懷古憂心如焚誰其似之經東暮雲笑翁禪師行狀住山物初觀師名妙堪號笑翁四明慈溪毛氏子生有道韻頂相平滿額廣伏犀甫冠銳欲超俗父兄不奪其志乃從邑之蘆山院野菴道欽薙髮受具戒欽使徧參歴依金山息菴觀淨慈肯堂充靈隱松源岳諸大老之門未泮所疑時天童無用全禪師以妙喜竹篦勘驗來者特卷祴東還造丈室用得之眉睫間問曰汝遊山僧耶師曰行腳僧用曰作麼生是行腳事師以坐具一摵用笑曰此僧敢來捋虎鬚且令參堂去職師侍香激揚錐劄盡無用之用嘉定甲戌妙勝虚席制使程公覃帖請出世一香為無用拈三年移金文又三年移報恩寶慶乙酉移虎邱明年閩帥方巖王侍郎請主雪峯紹定己丑有詔主靈隱三年遷明之大慈開山移翠岩淳祐壬寅有詔主淨慈育王久虚席朝論念迦文真身所在思能振起者精擇得師表辭一再不許淳祐癸卯領寺夙𡚁盡洗氣象一新法堂最圮會其費夥上出內帑以賜師傾鉢幐荊湖制帥孟無菴拱又以數萬緡助乃撤舊圖新其餘腐橈漫漶乃葺乃塗師以寺昔被遇昭陵而下三朝皆有奎畫之筆今上獨未有乃奏請焉金榜玉畫交映巖谷京兆大資趙公與籌奏以師再莅靈隱黨僧輩憚其嚴借勢沮之師亦以痼疾懇辭曰既老且病不能應世矣通守永嘉曹公邰拉同寮徐公獻子入山問疾且謀與制使顏侍郎請于朝用佛照故事以東堂佚老師笑曰吾今日行矣復何言乃書偈曰業鏡高懸七十二年一槌擊碎大道坦然擲筆而逝當淳祐戊申三月廿七日也壽七十二臘五十七度弟子二百餘人嗣法黃龍道詳翠巖宗古明因壽岳連雲惟枋報恩德雲薦福道粲等當育王命下之日師在翠巖知事往白涓剛禮儀師曰汝姑去俟吾報一夕葉舟從一行一力昧爽行松徑小休于亭遣報寺曰老僧已至但設堂供表禮足矣時太守有不悅於師一日騶從入山守絕不與師語偕至舍利殿忽問曰舍利在何處現師以手指松曰在此俄紺珠金光發自所指處一眾欣悅守改敬焉初育王有僧名超者厚於財死因致訟財沒軍資庫至師已廿餘年方營舍利殿軒得㫖以此充其費而亡僧之名始脫官籍矣平居制行冰檗長物亦不輕用惟於補常住資眾緣傾倒無靳色如斵石屋以覆明教嵩之窣堵尊先哲也市田歸里之寶嚴院以助修期報怙恃也至於重鋟妙喜語要補刊大覺塔銘皆表章正宗而開導後學之事其涉世如川行寓緣如雲凝不低顏以趨時不屈法以順人其為人行事皆無用之用又以語錄一編併刊以傳上壑翁相國啟物初觀夏用孟琯槐布繁陰恭惟鈞候一柱擎天三靈叶吉某藐爾緇褐幸際明時于去冬僥遷玉几進寺倐五閱月惕弗遑寧賒糴以興役估衣盂以率檀資外山門暨庫堂之大權菩薩閣已有成効方將再新宸奎淳熙二閣等慈堂及抽換翻蓋舍利殿等處斧斤斵削間而事力全缺租額素鮮歲又薄收無以濟之則中輟矣伏惟光範清峻相國尊嚴敢易以此事千載思興建之緣自非大際遇則罔克有成淳熙間妙智廓之建舍利殿遭遇孝廟則魏丞相之力也嘉定間無凖範之建東西兩閣則史衛王之力也笑翁堪之建法堂及舍利殿軒則孟保相之力也兹欲起廢植僵以接大覺璉遭遇仁祖時所建二百年舊規將憑誰之力歟伏惟大勳德大力量天子之所倚民社之所恃靈山付囑根於一念之微而發於宏䕶之間佛法賴以全盛也舍大丞相其誰求哉夫釋迦乃住世之佛玉几所藏真身舍利則阿育王所造八萬四千塔之一也皇宋累朝敬信宣請入內供養恩霈寵錫御墨絢爛載諸金石刻辭歴歴可攷紹興間兀朮入山取塔塔為僧所藏怒欲火其寺忽壁間瑞像發光出水輪藏不撥自轉兀朮懼再拜而去舍利寶塔之現于世鎮中國佑生靈其為益也多矣擬望鈞慈𡸁釋迦真身之所在特為斯剎作大主張則起此一方之廢俾復見全盛特一反掌間耳化機密運之及敷奏薦揚之力又何啻廓之遇魏相範之遇衛王沈沈壯麗繩繩禪侶香煖生祠像嚴鈞榘凝眸梵帙擁帔深禪福源不拒於涓流壽址不厭於增培埜人所當効忱者敢不自効也哉干冐鈞嚴不勝惶懼懇請俯伏俟命之至寄育王東堂栯堂禪師文益靈源大士居照默橫川老師居山寮高風相去三百載人世南朝自北朝䟦此菴師祖手帖南堂禪師清欲育王師祖老腕有回天之力一洗澆漓頓還淳古所與妙勝長老小帖雖尋常數語無一點俗氣而况筆意精妙不可及啟侍者既入保福一菴之室寶之宜矣遊育王寺二首菊磵居士高翥曉策烏藤上育王入山隨處得徜徉碑頭龍䕶先皇字塔上魚懸外國香徧謁僧房嘗苦茗閑聽社媪說毫光山深日短行難盡僧遣頭陀辦客牀精藍遊歴地景物自情親鶴引登山客僧迎禮塔人名花千佛供喬木萬夫身碑刻東坡作重來為拂塵橫川和尚住持育王疏釋道貫鄮嶺東震之鷲峯鷲峯西天之鄮嶺真身塔涌即佛現前彈壓山川貴得人物相稱能仁東堂橫川禪師宗㫖續臨濟楊岐應菴之脉說法無琢雕繪藻入時之辭真摧邪魔山之金剛王寶杵也燕京雁宕相距數千里之遙總攝除檄專僧敦請尊其道也如此雖則閒居宜老應物非時當念祖道靡委渝胥來作中流砥柱陪阮使君遊玉几山剡川戴表元花滿車茵酒滿船亂雲堆裏訪枯禪林深何處無芳草人靜有時聞杜鵑神屋盡飛青䃸磹靈潭陰罩赤蛇蜒居然悟得松風夢囘首廬山三十年育王長老見惠茶瓜次韻奉答三首學士清容袁桷玉几峯迎寶塔前彌天消息是真傳蒲團禪板都忘𨚫似笑當年手指天迸石春芽寶所藏枯松手拾許深烹能令星斗珠璣綻要使江山錦繡張道人種玉光千頃深陋長安畝一金只恐冰霜難下齒特將妙語助清音育王珙禪師示寂二紀嶼上人囘山中因寄塔主袁桷石塔累荒土月落冰稜稜永懷跏趺叟松風吹不譍山房舊淨供素壁一枝藤語默絕禪觀機深超祖乘擊石迸新火諸天化為燈上有白玉峯丹梯杳難登黃流鉅野漲虎嘯懸厓崩斯道倘未冺微言足搜徵偕劉胡二友遊育王寺朱右鄮峯山下育王寺舍利宸奎世所傳詞翰久推坡老筆塔幢猶記太康年天開玉几平如掌地湧金沙細出泉况是同遊得良伴仲秋風日正清妍前題劉鼎寶幢山色削芙蓉舍利相傳記佛踪野鶴循簷窺曉鉢淵靈聽法候晨鐘文光尚映宸奎閣雲氣長連玉几峯出郭已無塵俗慮來朝杖屨更從容前題胡璉明月堂前玉几青上方歴歴記曾經浮圖舍利原多幻高閣宸奎舊有銘隔水松聲來鶴背滿山雨氣帶龍腥相逢恰是中秋夕共話三生坐翠屏贈育王肇藏主恕中禪師無愠大藏小藏八靣玲瓏一撥便轉豈較西東玉几峯前振鐸須彌頂上撞鐘著著隨機利物頭頭開發盲聾大千一擲三十反風從虎也雲從龍謝天童平石砥問疾二首住山石室瑛是身無我病根深愧文殊遠訪臨自有巖花談不二青燈相對笑法身徧在一切處空得自由太白鄮峯烟雨裡笋輿來往亦阿育王古蹟無名氏陶隱君戒室梁天監十五年陶貞白先生宏景詣阿育王塔前受五大戒勾曲華陽天松風愛謖謖處靜上層樓梁武何由黷脫塵契育王受戒了緣夙璘公供奉泉肅宗朝內供奉范子璘為母懴雪入阿育王禮塔有供奉泉密密石叢盤涓涓雲竇出孝思格山靈甘泉隨杖溢旴江拈韻歌事與慈湖一璉公辭鉢亭仁宗賜大覺璉禪師龍腦鉢璉辭鉢謝恩曰吾法以鐵瓦為之此鉢非法對使者焚之賜詩建閣藏仁皇即是佛龍腦鉢堅辭物原無有物心清松下風玉几憑崪屹坦長老還金坊坦公少同人商賈海舶破千金受人寄託冐重險還其家受人寄金託險阻冐萬里完璧歸主還非為名利起一片信行堅表裡玉壺氷杲公歸祴閣徑山宗杲禪師與侍郎張九成忤秦相國竄梅陽十七年紹興丙子有㫖住持阿育王寺毘耶杜口人談玄莫逆契繆醜嫉惡深焚牒居瘴癘歸放赤堇山般若田普濟王文公祠文公令鄞多惠政建祠近阿育王寺半山執政偏惠獨施鄞土斗門東谷間利澤霑普漠漠茂草區誰還問祠宇大覺璉師以𨶒立本畫水官見遺報以詩蘇洵水官騎蒼龍龍行欲上天手攀時且住浩若乘風船不知幾何長足尾猶在淵下有二從臣左右乘魚黿矍鑠相顧視風舉衣袂翻女子侍君側白頰𡸁𩀱鬟手執雉尾扇容如未開蓮從者八九人非鬼非戎蠻出水未成列先登揚旗旜長刀擁㫄牌白羽注強拳雖服甲與裳狀貌猶鯨鱣水獸不得從仰靣以手攀空處走雷霆雨雹晦九川風師黑虎囊靣目昏塵烟翼從三神人萬里朝天關我從大覺師得此詭怪篇畫者古閻子于今三百年見者誰不愛予者誠以難在我猶在子此理寧非禪報之以好詞何必畫在前詩見聲畫集和育王十二題筠州楊屯田遙聞金在沙知是虛名號世人方競貪何兹有遺寶金沙池佛跡空在兹佛心無處所尋迹以求之似學邯鄲步佛跡峯萬物雖散殊孰非道之體何必石岩岩方疑金色臂七佛石梵教一來東群心日歸向土石至無情也作披緇怏袈娑衣月色固無改臺基亦不壞嗟哉翫月人古來誰復在明月臺形模皆自然樹立豈人力松影與秋光掃成真水墨石屏峯田苗自枯稿井鰻人所禱若教龍有靈此魚何足道靈鰻井璘師鑿此泉晨夕奉親老因知達者心豈嘗離孝道供奉泉嘗聞有為法佛說如夢幻胡然窣堵波香花耀凡眼育王塔晉後千百年兹殿儼如昔梵宇若皆然應須省民力八角殿典干既凌夷羣材共論謝惟有青青松於今被王化晉年札長疑佛界中天女來行樂為怕山風寒仙衣盡津忍重着重臺蓮明州阿育王山續志第十二卷目錄送丕上人還育王寺高啟遊阿育王山周翰遊育王寺胡庚遊育王山戴良題大慧禪師遺墨後宋濓阿育王山廣利禪寺塗田記宋濓雪窗禪師語錄序宋濓扶宗宏辯禪師生塔之碑宋濓育王禪師裕公三會語錄序宋濓約之禪師像贊宋濓寄育王寺日本使贈頤公張勇登上塔釋宗正次十景韻釋自學育王寺二首烏斯道過玉几二首薛仕銘送真藏主還日本釋自學悼育王澹菴和尚胡濙和胡宗伯悼澹公原韻王一寧和胡宗伯韻周忱和胡宗伯韻程高雲和胡宗伯韻吳餘慶和胡宗伯韻周草庭和胡宗伯韻祖淵和胡宗伯韻宗頃阿育王寺張時徹極目亭張時徹次十景韻清源本遊廣利寺張瓚重遊育王和壁上舊韻李堂留題廣公壁李堂玉几松堂記李堂送育王慧曉禪師東歸張邦奇贈全師住持育王寺序張邦奇遊育王寺沈仕廣利寺沈愷育王山陸釴遊育王寺胡鰲登青玉樓盧叔麟和馮松坡遊育王山張時敏和韻簡余司空避客育王屠大山金九山居育王因簡范欽觀育王舍利張信瞻禮舍利文徵明禮舍利塔楊汝芳偕李封若遊育王汪明際遊玉几山沃𩑚宿育王寺韓逢祐育王懷李孝甫太僕吳禮嘉同趙學憲徐侍御宿阿育王寺李德繼尋慧日上人不遇二絕李德繼阿育王寺二首楊承鯤同汪無際禮舍利二首李桐觀舍利張伯鯨禮舍利塔張球觀舍利四首周應賔
