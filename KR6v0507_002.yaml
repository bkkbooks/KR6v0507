body:
  text: 住山釋畹荃嵩來輯集送丕上人還育王寺太史季迪高啓解夏還尋舊寺栖滿船黃葉過長溪袈娑影入秋山遠舍利光懸夜塔低鵝識講時常繞聽猿知定後不驚啼𨚫慚擾擾塵中客覺路如今去尚迷遊阿育王山翰林維翰周翰欵欵籃輿駐嶺隈參差樓閣淨浮埃曇花香落諸峯寂舍利光分萬鑑開雲暖金沙龍躍出月明玉几鶴歸來平生幾兩登山屐覽勝應須步石苔遊育王寺訓導雲屋胡庚育王舍利梵王家寶塔稜層護碧霞龍擁奇峯橫玉几鰻藏靈井漫金沙山童招引要留偈老衲逢迎即供茶登覽喜探名勝地滿衣金粉落松花遊育王山九靈戴良栩栩招提遊冥冥山海觀玉几峯影橫金沙水流漫鷲嶺騫皎日雁塔峙青漢遠睇朱甍起近睹丹宮煥金輪事已往舍利光猶爛亦有巨人迹不隨塵剎換陟降境逾繁應接日旋晏耆闍闔追衍泉石寧盡玩浮生諒多途又動歸與歎題大慧禪師遺墨後宋濓右大慧和尚杲公為僧清立所作疏凡一百九十四言乃公七十一歲時書其凌厲橫逸之氣老而不衰于此猶事見其髣佛人知仰公者惟知説法如雨如雲覺悟羣迷而不知其忠義耿耿注意于國家者甚篤縱有知其忠義者而又不知其戲遊翰墨循蹈矩彠亦自可傳不朽嗚呼若公應物無方事謂如神龍變化不測者矣疏文不局于駢儷之體而特學趙州公案為言無非欲大法以昭示人後來沉溺葩藻而于道無補者其尚以公為鑒哉清立字無欲公嘗稱其堅厲人道亦嘉士云阿育王山廣利禪寺塗田記宋濓明之廣利禪寺名列五山為浙江東一大叢林緇衣之士執瓶錫而來者動以千計舊時多土田而淪沒者過半一遇乏食必持鉢走民間以乞食為事寺之長老普濟禪師光公既為正其侵強復謀買田以助之既賫志而歿其弟子象先輿之恢廓而有為乃慨然曰先師之志我不可不就也市奉化縣腴田數千畝有畸錢以緡計者十千九百有畸俾其徒嘗輸力于其間者若廣融若景等輪掌其事歲收其入六百斛薦于寺中以補其不足且建三楹間以為儲偫之所愛伐豎石囑余為之文而勒步畝之詳于石陰余謂象先之功侈矣固不可以不書然而文之體因其事而著其理始為得之請偕田為諭以勵夫進修之士何如象先曰不亦善乎士之進修則不昧因果所謂竊攘質鬻之禍不作吾田固有永而不廢矣余因諸佛為證結跏趺坐為説偈曰大田在海濵厥土惟塗泥何物不可藝之禾乃有成禾根入土已當加保衛力涵受及糞土耘耔復以時勿使惡草生若非雨露滋亦不能生成數者既能備時至自然熟佳穟纍纍然遍及郊野中我心有如田諸種靡不納青黃與白黑隨其所種生菩提譬佳禾種之即有秋持戒為保衛忍辱為涵受布施為糞壅精進為耘耔智慧為雨露禪定道乃成人力一不至田雖號膏腴蒿萊日夜長雉兔之所藏蛇虺共出沒化為荒歲逼欲求一粒粟有不可得者我心倘不治其失亦復然治心如治田豈不以此故上人最可便市田繼先志食此緇衣衆頓免飢火𤋎食者或感觸寧不思前喻嗜道如嗜食定知顆粒微視如萬金重進道功或怠亦不易消受刻文于貞珉讀者知自勵更加護持力常使食輪轉雪窗禪師語録序宋濓或問余曰達磨西來以不立文字為宗蓋欲掃空諸相直究本心而趨真實覺地者也名山宿德何莫非達磨之子孫為之徒者因其説法往往編以成書號曰語録矣乃與不立文字之旨相戾乎曰非是之謂也扶衰救弊各隨其時節因緣有不可執一而論者矣昔我三界大師演説大小乘其弟子結集為修多羅藏至繁且多也復慮後人溺于見解而反為心纍故以正法眼藏付于摩訶迦葉拈花微笑之間無上甚深妙法會攝無餘此亦化導之一門耳非真謂鹿野苑至跋提河所言皆當棄之也不然如來自兜率下生何不即以單傳直指示人顧乃諄復勸誘而勿置之邪去佛既遠學有纏繞名義不能出離誠有如如來之所慮者達磨出而救之故取迦葉微笑之旨導以示人益亦有所甚不得已焉爾育王禪師以三昧力入智慧海初説法于白馬寺繼遷開元已而住育王山兼領天童寺事四會之間緇素翕集所以啓人天龍鬼之聽屹立不遷如真正幢涉險度危類大法船若見若聞皆獲利濟至若𡸁示之語以驗未學又如臨萬仞懸崖而立非上根大器豈易入其閫奧者哉虞文靖公贊師之語謂為佛果一枝鳳毛麟角者其言良可信不誣也師入滅之十四年其上首弟子象先輿公月經滿公以所録語徵余為敘余故舉扶衰救弊各隨其時節因緣者言之于見達磨之宗非有違于先佛諸師之録非有違于達磨其事雖殊理則同也有若禪師此録之行後有因語言而入者雖不得見師而師之惠利所及益遠矣靈妙一真直超三界其大無外其小無內雖無物之不攝欲求一物了不可得于斯時也無煩惱可除無法門可學無衆生可度無佛道可成尚何有言語文字之可足論哉觀斯録者又當于是而求之人能于是求之始于禪師之道與有聞矣禪師名悟光字公實姓楊氏別號雪窗成都之新都人扶宗宏辨禪師育王約之裕公生塔之碑宋濓禪師現坐玉几道場説法度人而絶去來之相預建塔于廬山石耳峯下期他日為設利之藏其上首弟子師秀持嶽林住山良珵所聚事行徵濓為銘勒諸塔上嗚呼有若師者其殆能齊生死晝夜之理者乎師名崇裕字約之毗陵陳氏子其母氏夢龐僧乘肩輿叩門呼曰吾將假館于斯母覺時有娠十月而生四歲始覺步七歲入學資職超羣然體素尫弱十日九疾每視佛像輒跪瞻禮父母以其應夢冀徼靈釋氏愈之命從壽昌院東林曉公為沙彌院有大梨木三十年不發花及師之來花開滿樹結實大如斚東林知為祥徵度為大僧受具俄蓬纍而出登雙徑山謁寂照端公惟以觀心為急務閲三年未有所證偶遊東坡池因操觚成一偈寂照見之喜云此龍象器也命為侍者師勿從復走天目山見佛慧義公受以萬法歸一語師淬礪益力又二年復度中天竺參廣智欣公一造戶庭如膠漆相入廣智為舉臨濟無位真人之言且詰之云爾還知否師即下拜智云爾何所見師答云拜者非是他人智云從門入者不是家珍耶師云和尚慎勿欺人智首肯之元文宗詔建大龍翔集慶寺于金陵起廣智開山師復往依焉充維那之職未幾掌藏鑰十餘年間盡得其學御史中丞張公起岩問廣智云選佛場中如此多衆其有弗悖般若者乎智云戒律精嚴言行不背唯崇裕一人自受度以來脅不沾席者三十年張公深加獎嘆朵兒只國王時以浙江行省右丞相領宣政院事遴選諸方住持名既上猶恐其未公也投鉤而定之師始出世太平南禪報恩光孝寺瓣香之祝蓋嗣廣智云師以誠遇物黑白宗之一日令圬人塓壁壁中隆然有物扶之獲悉達太子像乃佛牙所刻成師召工傅以黃金金迸裂設利從中涌出奉以香殿遐邇施者日新月盛數載之內百廢具舉名聞于帝錫師以今號尋遷九江圓通崇勝禪寺宋之初有神僧道濟將示寂纍青石塔語其徒曰此塔若紅我即再來洎圓機旻公來塔果紅色人異之及旻公終復爾懸記有三百年後大興佛事之讖師入院之夕衆僧夢旻公至而其塔發光者彌月人尤異之數年之間寺為重新時榮國公火像赤總戎江西慕師之慈行申弟子之禮受持五戒而退洪武元年開善世院以統攝釋教命大浮屠主之諸方以師名聞移主四明阿育王寺寺居五山之一頗難其人聞師之臨少長咸悅香花遠迎者接踵于道時當仲冬天樂如聞萬行稱頌爭言見未曾有及其接引未悟專指單提向上之功棒喝縱橫云云育王禪師裕公三會語録序宋濓古人之道感而形化曷嘗貴於言哉甚不得已而有言言或易於遺忘又甚不得已而記録之雖曰形諸簡編然懼不能行遠又甚不得已始刻文梓而傳之其言之也欲擊蒙於當時其傳之也將澤物於後世惓惓為道之心為何如哉此濓於歷代諸師之言不能無感激也者則曰靈明中居一塵不可留况語言文字紛穢龐雜足以礙沖虛而窒真如達摩氏東來持楞伽經以印人心楞伽佛口所宣也君子尚謂其墮於枝蔓况後來師弟子策勵之言乎曰不然也人之根性不同而𡸁接之機亦異其上上者一見之頓情塵自然銷殞何暇於言哉若下下者朝夕諄諄誨之淡如嚼蠟竟不知其味苟欲絶文字令其豁然自悟是猶采鳧藻於山巔求女蘿於海底終不可得也今之去古亦遠矣自大鑑以來其語具在人仰之者如應龍升天海立雲流或現大身或現小身不可以凡情測度儻不因其言而求之則其超然獨立不墮色聲者奚從而知之既知之必將而象之若以其窒真如而礙沖虛一切斥去濓不識其可乎雖然寶積經云如來所演八萬四千法藏聲教皆名為文離諸一切言音文字理不可説是名為義法藏且爾况下於斯者乎以此觀之當略其文而究其義可也然而取魚者必資筌博兔者當用蹄兔與魚既獲而無事於蹄筌吾心源既澄識浪自息復何義之云乎濓之區區又不能無感於後之人也育王禪師裕公三坐道場策勵學徒如青天霹靂聞者掩耳演説無上妙道如升蘇迷盧山濶視四天下百物無所遁藏大司徒楚國歐陽文公謂其言出入宗乘內典左右逢源其文涉獵百氏燦然可覩鞔峯住山恕中愠公謂其故施踔厲不愧為大慧七世孫皆知言濓頗獲與公遊嘗以賸語三卷質正於公公不鄙而題識之許其可以入道今已十閲寒暑矣公之徒師秀不遠千里以公三會語請濓序而傳之嗚呼公之有言與秀之汲汲圖此者夫豈得已者哉濓雖不文因不辭而書諸首簡云約之禪師像贊宋濓龐蔚之姿宏辨之才一衲二十年脅不沾席談元八萬偈舌若驚雷崖樹重榮兆法門之復振塔光呈瑞擬古佛之再來炯炯乎眼光閃爍沉沉乎氣宇宏恢颯颯乎九江風動巍巍乎玉几天開一真超于實際斯不染于纎埃彼自安于培婁曾莫陟其崔嵬倘于斯而觀感庶立懦而興頽遊育王寺日本使偶來覽勝鄮峯境山路行行雪作堆風攪空林飢虎嘯雲埋老樹斷猿哀擡頭東塔又西塔移步前臺更後臺正是如來真境界臘天香散一枝梅贈頤公張勇靈谷禪堂飽五車育王虛席待蜂衙兔毫乍染成文錦麈尾才揮雨寶花虎聽談元來玉几龍聞説法出金沙山門從此增輝耀舍利光騰見彩霞登上塔住山釋宗正危巔一塔與天齊乘霽偕遊不倦躋凍合石林三徑曉雪堆松壑萬山低斂衣暫坐看雲起曵杖徐行聽鳥啼白髮頭陀忘世久茆龕破衲事幽棲次十境韻住山釋自學西竺分來鎮海隅奇形異狀世難圖夜深現出香雲裡烜赫猶如琥珀珠舍利塔烏石山中最吉祥千年舍利久珍藏一朝慧達來虔禱湧出浮圖放寶光湧現岩碧澗寒潭百尺深清光皎潔照天心傳聞七佛曾來浴一道流輝亘古今七佛潭梵苑清幽絶世塵洞中風月自通神大權顯迹名猶在雲合雲開幾度春大權洞果滿三祗百煉金功圓無度幾生心腳跟牢實從人看頑石分明一寸深佛迹岩石上鎸書是異人墨光常帶紫痕新煙霾雨洗難磨滅占斷祗園萬古春仙書岩老禪過化顯靈蹤鑿出清泉映碧空海衆雲廚蒙利濟天人咫尺仰高風妙喜泉大覺談元合聖機親將詩偈賜金闈宸奎高閣蘇公銘落落清名四海飛宸奎閣鄮峯東畔金沙井千古潛藏護塔龍邑令年年來奠祭大施甘澤灑長空金沙井天排玉几當門外不用良工巧琢磨春霽山花開萬朵宛如仙女散曼陀玉几峯育王寺二首春草烏斯道鄮嶺名如鷲嶺傳剎竿無恙已千年地雄南土居三佛山盡東溟倚半天宸翰香浮高閣表岩泉清出老松前遊人自覺虛生白猶覔神光上客船靈蹤深閟壓東南樓閣丹青閃翠嵐燈影半空搖上塔爐熏千載出西菴山看玉几無雲好泉取金沙瀹茗甘細讀長公碑刻畫黃昏萬丈覔龍潭過玉几二首薛仕銘地形拗曲類盤渦四顧羣山擁翠螺舍利真身藏塔表承恩高閣寄岩阿金仙法座青蓮捧寶匣神經白馬馱此日勝遊歸路晚輕袍惹得異香多勝地從來入品題不須掬水覔曹溪金沙井潔群龍蟄玉几峯橫一案齊塔影遙分天上下鈴聲遠拂樹高低我來今日登臨罷謾向松陰散馬蹄送真藏主還日本住山釋自學早年奉使入中州詔遣東還寵渥優行色未曾辭上國恩光先已照遐陬山低熊野高飛錫水濶鯨波穩泛舟遙想彛王欣拜復三呼萬歲祝皇猷悼育王淡菴和尚禮部尚書胡濙慈恩樓閣倚雲開一代禪翁去不來滄海掀翻鋪地浪虛空撲落震天雷能推此道多年學善證斯文出世才玉麈不揮今已矣令人慟泣赴猊臺和胡宗伯悼淡公原韻太子少師王一寧訃音驀爾致余開云報慈恩歸去來法性遊空明似月聲名動地響如雷自兹鄉里無知己孰似禪中有辨才六月漫天飛白雪茶毗相送出金臺和胡宗伯韻工部尚書周忱几禪關晝不開遙傳天子詔書來銅章握處貴玉法鼓撾時響若雷瑚璉固為宗廟器楩楠應作棟梁才而今隻履西遊日漠漠愁雲暗寶臺和胡宗伯韻翰林程高雲育王法席喜宏開鶚薦新從上國來每共鴻盧聽早漏幾同鳳闕起春雷師居僧録推多學我忝詞林愧乏才一自西歸無復覩傷心愁過雨花臺和胡宗伯韻翰林吳餘慶別館同將梵策開天書三詔喜重來空聞隻履回蔥嶺不復高談振法雷白首匡宗扶短策赤心輔教屬長才方欣領命居僧録遽返天宮坐寶臺和胡宗伯韻御史周草庭三十餘年蓮社開無心杖錫去還來位超海印清於水哀動殊方沸若雷喜世一時推偉器法門千載負良才臨風幾度空惆悵一束生芻禮化臺和胡宗伯韻雪峯祖淵泥封三度手親開杖錫今從天上來浩浩辭翻三峽水殷殷振動一聲雷高僧詩內膺清選覺義銜中列上才選佛選官俱勘破爭如端坐九蓮臺和胡宗伯韻徑山宗頃憂思百結鬱難開訃及慈恩寂滅來客底有懷空對雨社中無復見宗雷𨺗興幻相惹妖孽驀起毗嵐霣異才方伯素知師德重天詞首製出容臺阿育王寺尚書東沙張時徹不是煙霞客青山夙有緣松筠隨處好猿鶴與人便拂袖雲中語聽泉石上眠逍遙堪避世色相為誰傳蘭若依山腹朝霞起樹巔但從樵徑引直到斗牛邊瀑布垂青壁藤蘿挂紫煙相將憑玉几洗藥問靈泉極目亭張時徹曲徑緣青草孤亭占碧空望窮三島外身在九霄中霞起群峰亂浪翻夕照紅翩然振衣袂直欲駕長風次十景韻住山清源本黃金鑄出塔中虛百億神天護地圖舍利古今光不夜莫教人訝活龍珠舍利塔育王勝地八禎祥湧出浮圖舍利藏日月不知天地老年年花發笑春光湧現岩地不寬兮水不深分明只要滌塵心滿身垢濁無人洗嬴得虛名耀古今七佛潭菩薩金軀逈脫塵只因護塔顯威神洞門開處無人到野草間花不計春大權洞男兒膝下有黃金踏斷懸崖鐵石心多少人看都不識可憐埋沒白雲深佛迹岩石書傳道是仙人雪囓霜叨色倍新一假精神磨不滅年年香擁百花春仙書岩滾滾心泉不見蹤鏡光搖漾照虛空自知一深無底不怕魚驚白浪風妙喜泉崔嵬傑閣煥天機上出重霄掩翠闈壯觀育王殊勝地此名無翼勢長飛宸奎閣金沙三井鄮峯東雜布金星漾活龍聞説昔年多感應炎天施雨滿瑤空金沙井山橫一帶翠婆娑玉几當胸手可磨阿育國王真富貴令人千古誦伽陀玉几峯遊廣利寺郡守孝感張瓚萬松夾道隱鳴鐘望入承恩紫氣重古陌行詢馴野雉禪堂延話起潭龍雲霞長護金沙井日月平臨玉几峯記得坡翁曾解帶公餘猶得暫從容重遊育王和壁上舊韻侍郎堇山李堂未老謝新銜尋真禮佛函凌虛憑玉几望海陟華岩潭倒浮圖影香凝舍利緘病軀登覽倦空翠濕春衫留題廣公壁李堂玉几憑虛紫翠藏上方登處見扶桑龍歸西隱拖晴塔鶴放東林過草堂僧慧佛靈開舍利石蘭岩桂發天香草年又了重遊願借宿湯休一榻涼玉几松堂記李堂玉几山廣利寺之案山也寺以鄮峯為倚松堂俯臨之若降伏然蜿蜒偃臥于前靣清流而背突兀層巒疊嶂之爭奇獻秀者咸萃焉真僧剎之雄勝也名其堂者宋張寺丞即之容菴福禪師乃本寺九十四代住持也重建斯堂再新其額辭世退居者已五十年兹壽屆七旬山門諸上人屢以記為請蓋欲揚美以紀實也余知師以符篤行者虛文奚為哉惟宇內名山咸為佛供而至人所寓地益其靈兹山自晉以來佛靈留迹舍利現光形勝稱重于古今非以環奇傑異之賢代為主盟故彌久而益盛哉國朝高僧如自學宗正二公咸以詩文應召登進于京然禪宗師律承起淵源則于容菴僅見焉蓋以無有為宗以濟物為用以性為本來以情為外障屏虛幻于了悟戒蔓説于造詣非傳燈石也其派即曹溪其成可迦葉也或曰師慧相清嚴緇流仰賴薪于山岡隴彌焉稼于田膏腴盈焉𨽾于籍貢賦充焉祝延之餘此以福田利益表其功非知師也盍省諸堂顏乎松為操玉為資與山堂並美于無強斯贈言之意也衆皆曰然遂為紀之送育王慧曉禪師東歸文定張邦奇重落風塵又十年石房燈影憶談禪機超曲棘貞松外人在黃花翠竹邊玉几金堂常入夢錢湖銀海浪飛仙東歸倘説西來意灰冷香爐繡佛前贈全師住持育王寺序張邦奇阿育王寺在古鄮城之東釋經所稱海岸孤絶處也而佛氏生于極西繇西土而至東海之壖相去邈絶而舍利于斯乎集焉余竊謂佛氏者亦固欲神其法炫其精神于絶遠之地乎及余遊山則玉几前峙鄮峯後聳陽堂太白諸山遠近環布而碧海錢湖輝映左右穆然而竹樹清朗然而天宇曠夫舍利之兹集也雖曰役諸鬼神而山川靈秀之氣亦自有所感也月庭全禪師修持慈溪之永明年五十矣質直簡亢無矯容飾行然通儒術能詩歌故一時名縉紳樂與之遊乃者永明山門弗戒十火慨然佐其師綱公揮資千金飾新之人以為難嘗別築塔室于塔山以為遁志而育王諸僧自謂名山必得全師住持庶足為重乃相率禮請既得允而謁文于余余嘗遊彭蠡入洞庭登武當衡嶽徜徉其巔溯三峽而棹玻璃以極乎岷嶓之陽而望西域之境名勝之區歷覽殆遍若育王之勝則惟風氣所鍾佛靈所注海內諸剎百億計而獨巋然為五名山之一也夫豈偶然哉去年秋山門亦燬師復捐資以助興建其平生清苦節縮積而知所散蓋如此師出錢氏為慈溪望族代有聞人曰明之者與余同舉于鄉余每至永明師意加勤厚焉謁余文者育王僧曉公數遇余寶雲之禪房能談三乘令人忘倦云遊育王寺沈仕梵帝西清境靈岩上巳辰紅收行靄盡緑遍望煙新寶樹分雙影龍泉吐九津露華凝瑞液日彩上仙輪殿繞芝花秀階𡸁貝果珍蓮峯雲是葉鏡水霧為塵暖益恆河潤光生法界春空香縈草木花雨散天人意府董休旨形圖照勝因曹溪原淨域何藉剪荊榛廣利寺郡守沈愷凌風探海窟半日與僧便身在青霄上人依北斗邊乾坤分楚越今古此風煙欲訪洪崖迹思參玉屑泉育王山榜眼陸釴盡梯千尺上招提古木陰森曲徑迷僧定海霞棲石榻佛光空翠映花溪穿林傍月時聞磬步壑看雲一杖藜名勝古來麗文藻莫教碑蘚蝕新題遊育王寺胡鰲名山開玉几舍利擁瑤臺古木天邊起溪光谷口開煙霞任出沒樓閣獨崔嵬夜靜收餘雨鶴鳴何處來登青玉樓時餞別吳左江盧叔麟本為南浦別聊作上方遊塔頂晴雲墜林間寒雨收鳥鳴山愈寂僧引客同幽千里金陵月先臨青玉樓和馮松坡遊育王山洞雲張時敏鄮水叢林曲徑微詩翁先我入岩扉煙消谷口聞鐘出雨過松梢見鶴飛掃石欲留明月至投簪原為買山歸塵機到此同禪息懶向王程問是非和韻簡余司空避客育王侍郎國望屠大山聞道招提客投間未得間賔朋隨杖履觴榼滿秋山冒雨荒涼外逢僧夢寐間談禪何所悟徒見鬢毛班金九山居育王因簡二首侍郎東明范欽杖屨何方去蒼茫雙樹林人天開覺路法雨淨幽襟野曠冰霜合峯回紫翠沉遠公期入社端候虎溪潯地擁金仙界風流學士船衝寒緣避客攬勝且安禪人世空山外年華短髮前不知同社友形影坐相憐觀育王舍利狀元張信浮海東來禮育王寶龕舍利放毫光前朝御墨留恩遠當代高禪受戒香山自天生橫玉翠沙從地湧布金黃燈傳奕葉昭因果誰謂瞿曇事渺茫瞻禮舍利文徵明東風一舸上蓮臺窣堵光明寶藏開水漾金沙從地湧山橫玉几自天排浮生擾擾成虛幻法性如如無去來欲究南宗參百丈遠公何日渡江杯禮舍利塔楊汝芳躡屩度雲壑來瞻舍利光寶輪從地湧玉几散天香塔影千年古鐘聲六代長隨機多變現水月映松堂偕李封若遊育王汪明際不憚翻漿揮羽翰蕭題蘇額漫盤桓到來玉几當階秀聽入龍吟徹夏寒幾座殿堂雙樹下無窮法界一毫端從來聖相隨人現莫作區區目眚看遊玉几山御史沃頛春日煦祗園松杉夾道妍絳宮青嶂裏清梵白雲邊縹眇鐘聲度高低塔影懸老僧方出定趺坐共談元宿育王寺韓逢祐遙泛香河過上方因瞻舍利叩空王金沙日湧花為雨寶塔時開佛放光支遁許來元度宅陶潛寄傲遠公房白雲深處通宵話不使春眠客夢長育王懷李孝甫太僕吳禮嘉步輦尋幽滿路苔萬山盤鬱紫霞開腳跟漲海連三島眼外長空隘九垓髣佛臥碑坡老迹岧嶤新搆陸公臺一樽鷲嶺誰聯句白也清狂故不來同趙學憲徐侍御宿阿育王寺李德繼日日登臨未擬還更尋別徑訪松關毒龍潛伏金沙井靈鷲高飛玉几山月照清池僧榻淨雲封紺殿佛燈間知君共有談禪興不厭華簮對白綸尋慧日上人不遇二絶李德繼溪口蒼煙瞑山頭落日懸松關空自掩寶月獨姢姢徑曲迷花草門深掩碧蘿禪房相待久悵望竟如何阿育王寺二首楊承鯤日入山燒起蒼茫煙霧新彤雲低殿閣高樹宿星辰龍象千年地袈裟幾葉身自知甘濩落不是學離塵去去盤雲轉高高望海行到山千澗響入谷萬花明邱壑夢嘗往煙霞疾未成興來還不淺翻劇子規鳴同汪無際禮舍利二首李桐娑羅雙樹護空王膜拜時通鼻觀香共覩靈珠呈異相敢言慧眼發明光繡幢輝映千花座窣堵莊嚴七寶裝清磬數聲塵土隔天風吹下晚風涼暫憩名山裏虛無坐可邀松聲傳紺殿塔影上青霄梵逐流風起鐘隨曠野飄通宵才一覺幽夢未能消觀舍利張伯鯨冒雨初登舍利臺梵宮基在亂雲隈山留玉几為天案珠護金鐘作佛胎花落空階猿悟去風翻高樹鶴飛來祥光五彩看非易囑付山僧莫浪開禮舍利塔張球皈依客自舊中吳白髮其如感慨何光吐千秋呈舍利花開五色見娑羅金沙風靜龍形斂玉几雲封鶴夢多何幸支公成妙悟肯移杯渡一相過觀舍利四首周應賔聽法降龍出海聞經香象渡河五色華開優鉢一輪月影莎蘿草色印明沙界溪聲響徹潮音剝落五重衣障打成一片禪心木幻軍持不放蒲團貝葉常親得見菩提真性便是如來法身朵朵黃花般若竿竿翠竹真如要識寒山拾得即為普賢文殊明州阿育王山續志第十三卷目録送君房之育王山沈明臣阿育王寺萬表遊育王戎來賔阿育王寺夜坐王思任宿青玉樓沈明臣陪家四兄育王寺晚眺楊承鵾入育王寺二首禮舍利余寅育王禮舍利吳栩宿育王精舍莊學曾觀舍利周應治同黃省菴杜武川兩工部遊寺李生時阿育王山管大勳靈菊軒記戴洵初觀時賦八律靈菊馮柯育王殿宇重新聽沖法師講經周應辰寓廣利寺贈柏亭上人吳禮嘉觀舍利塔林棟隆贈育王曉上人汪坦過玉几松堂見先文定留題張茂之舍利殿記王章遊育王次高郡侯韻傅文淵玉几峯余寅陪友遊育王山李瑋從天童過育王二首謝三賔極目亭望海附宋左街僧統贊寧寶塔傳補遺宋孝宗皇帝賜佛照禪師補遺登阿育王塔李德愛佛迹亭李德愛重過育王西塔院三首周容登阿育王塔方劬阿育王山阻雪釋德介西塔院訊太初老宿釋德介丁丑夏日北上過育王別秋遠和尚二首釋元乘
