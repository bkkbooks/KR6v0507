body:
  text: 住山釋畹荃嵩來輯集先覺考補遺晉開山利賔菩薩并州離石人姓劉名薩訶法號慧達西晉太康三年鄮陰求塔出現開山歷宋齊梁陳隋五代皆律居講席其住持俱莫可考宋禪宗第一代宣密素禪師嗣雲居齊公宋端拱元年奉敕自保福禪寺主此山寺始為十方禪剎按朱金華碑載寺之主僧自宣密素公始可考見至洪武十一年約之裕公代經六十三傳矣七月初一日忌第二代守初禪師筠州人俗姓劉天禧五年住此山易寺南向八月初七日忌第三代常坦禪師嗣福昌善公三月草一日忌第四代澄逸禪師嗣育王坦公八月十七日忌第五代大覺璉禪師字器之漳州龍溪陳氏子嗣泐潭澄公皇祐中仁宗召對化成殿問佛法大意奏對稱旨賜大覺禪師之號又賜御書詩頌十有七篇建宸奎閣十二月草九日忌第六代寶鑑達禪師饒州余氏子嗣福嚴感公十二月草二日忌第七代覺禪師八月草八日忌第八代真戒振禪師嗣瑞巖鴻公十一月二十日忌第九代寧禪師十一月三十日忌第十代月堂昌禪師四明吳氏子嗣雲峯慧公十月初十日忌第十一代無竭曇禪師嗣寶寧璣公正月十五日忌第十二代聰禪師六月草一日忌第十三代了空潭禪師六月草九日忌第十四代真歇了禪師十月初一日忌第十五代無示諶禪師九月十七日忌第十六代佛智裕禪師嗣圓悟勤公十一月十八日忌第十七代圓悟粹禪師十月初八日忌第十八代野堂崇禪師四明人嗣泐潭清公五月十三日忌第十九代默禪師六月草七日忌第二十代大慧杲禪師嗣圓悟和尚置般若莊田八月初十日忌第二十一代大圓璞禪師嗣大慧杲公二月初五日忌第二十二代慈航朴禪師二月初八日忌第二十三代妙智廓禪師八月初四日忌第二十四代佛照光禪師嗣大慧杲公三月十七日忌第二十五代秀巖瑞禪師閩人嗣佛照光公六月草三日忌第二十六代退谷雲禪師嗣佛照光公十月十三日忌第二十七代空叟印禪師西蜀人嗣佛照光公六月初三日忌第二十八代海印空禪師十一月十九日忌第二十九代晦菴明禪師嗣鼓山永公五月十一日忌第三十代孤雲權禪師陝西人嗣佛照光公十一月十七日忌第三十一代如菴崇禪師九月十三日忌第三十二代晦巖光禪師八月十二日忌第三十三代無凖範禪師嗣臥龍先公三月十八日忌第三十四代石堂明禪師二月初七日忌第三十五代大夢因禪師十月草九日忌第三十六代癡絶沖禪師嗣薦福生公三月十五日忌第三十七代斷崖躬禪師三月初十日忌第三十八代晦室明禪師七月三十日忌第三十九代笑翁堪禪師嗣無用全公三月草七日忌第四十代偃溪聞禪師嗣淅翁琰公六月初十日忌第四十一代東谷光禪師嗣華藏祚公第四十二代毒川濟禪師嗣淅翁琰公六月十四日忌第四十三代虛堂愚禪師四明人嗣法于道場巖公第四十四代西江謀禪師南昌吳氏子嗣淳菴淨公第四十五代淮海肇禪師通州潘氏子嗣淅翁琰公第四十六代物初觀禪師鄞縣橫溪陸氏子嗣淨慈簡公第四十七代藏叟珍禪師南安呂氏子嗣妙峯善公五月草一日忌第四十八代東叟愷禪師嗣大川濟公十二月十四日忌第四十九代寂窗照禪師福之閩縣鄧氏子嗣枯禪鏡公元第五十代頑極彌禪師嗣癡絶沖公第五十一代清溪沅禪師嗣枯禪鏡公八月草八日忌第五十二代朽菴祥禪師嗣華藏淨公五月初五日忌第五十三代橫川珙禪師永嘉林氏子嗣滅翁禮公三月十八日忌第五十四代愚極慧禪師嗣石田薰公六月草五日忌第五十五代東巖日禪師嗣西巖惠公五月初九日忌第五十六代東生明禪師嗣頑極彌公二月草三日忌第五十七代石湖美禪師金陵畢氏子嗣無文傳公第五十八代月江印禪師慈溪劉氏子嗣虎岩伏公第五十九代石室瑛禪師嗣晦機熙公三月十七日忌第六十代雪窗光禪師嗣東嶼海公六月初一日忌第六十一代性空達禪師嗣雪窗光公七月草八日忌明第六十二代大千照禪師嗣東嶼海公十月初七日忌第六十三代約之裕禪師毗陵陳氏子嗣笑隱欣公第六十四代象先輿禪師嗣雪窗光公重建下塔築黃賢塘得田二千餘畝又市史氏田一千五百畝名忠義莊崎頭莊第六十五代南宗定禪師嗣孚中信公第六十六代別峯在禪師嗣天界曇公第六十七代天章玘禪師嗣雪窗光公第六十八代原素儉禪師嗣原明良公第六十九代契庵得禪師嗣大千照公第七十代宗冕軒禪師嗣法未詳第七十一代西竺來禪師嗣慈舟濟公十月初八日忌第七十二代北宗濟禪師嗣西源達公第七十三代少林宗禪師嗣芳林鬯公第七十四代古章憲禪師嗣天界泐公第七十五代椿齡壽禪師嗣忍庵慈公十一月草二日忌第七十六代無方超禪師嗣物先羲公第七十七代瑩中玥禪師嗣契庵得公第七十八代用常憲禪師嗣別峯在公第七十九代西原遠禪師嗣元極頂公第八十代淡菴學禪師嗣元極頂永樂間欽召擢右街之任六月初二日忌第八十一代體元正禪師嗣天淵濬公正統九年欽召至京開萬善戒壇十二月草四日忌第八十二代圭中璧禪師嗣無作行公第八十三代懶菴警禪師嗣法未詳第八十四代清源本禪師姚江陳氏子嗣靈隱借菴第八十五代伴雲㞰禪師嗣益宗學公八月初七日忌第八十六代大用成禪師嗣法未詳第八十七代大本中禪師嗣益宗學公第八十八代印空海禪師嗣潔空通公第八十九代白菴金禪師嗣法未詳第九十代月庭全禪師第九十一代松林茂禪師第九十二代古心恆禪師第九十三代大海澄禪師第九十四代如海福禪師本郡朱氏子嗣清源本公第九十五代無涯廣禪師第九十六代東溟浩禪師第九十七代宗靜邃禪師第九十八代大止進禪師第九十九代玉庭珍禪師無漏瓶禪師嗣妙峯覺公闡天台教觀重建舍利塔殿九月初二日忌祕藏理法師宛陵人嗣無漏瓶公纂修育王山志密雲悟禪師嗣幻有傳公七月初七日忌清太白雪禪師崑山徐氏子嗣費隱容公八月二十八日忌祖林明禪師嗣太白雪公九月十八日忌嵩巖靈禪師嗣太白雪公六月草七日忌法鐘覺禪師嗣太白雪公十一月初六日忌秋遠碧禪師嗣法鐘覺公十一月十九日忌遜安讓禪師嗣秋遠碧公十一月初二日忌嵩來荃禪師嗣秋遠碧公舍利懴儀序思齊釋實賢蓋聞法身無象因萬物以賦形道體無方隨衆生而應迹爰自雙林示寂中夜還源玉毫斂影於人間寶相潛輝於宇內所遺舍利三分攸分乃造浮圖八國是奉屬當五天之地經歷一百餘年爰有聖君厥名阿育乘鐵輪而應世受佛記以為王志在福田心存佛法甫聞舍利始事請求於是塞恆水之刀輪機關不轉開世王之寶篋油火才乾阿闍世王取佛舍利藏恆河中作千歲燈供養中安金篋用盛舍利外置刀輪四靣旋轉流水激之輪無停晷阿育王欲取之殆不能得有蓮花比丘教以擲奈塞之輪即不轉乃下取舍利才開金篋油盡火滅乃役鬼神之智力載求羅漢之神通集衆香以成泥碎七寶而為末八萬四千之佛塔終夜告成二千三百之人寰即時分布百神奮足爭馳五指之光萬鬼昂頭齊覩半空之臂阿育王取佛舍利令諸鬼神以香泥寶末一夜造成八萬四千寶塔請耶舍尊者舒指放光八萬四千道諸鬼各隨一光盡處安置一塔尊者于虛空中以手障日諸鬼望之普天之內一日之中同時下塔塔廟於焉始盛佛法由是大興彼居中夏數乃衆多此屬東方處唯十九阿育造塔之歲則是周厲王之共和年也自餘諸處聖迹罕存唯兹四明靈蹤尚著昔在西晉年曰太康有并州劉薩訶者利賔菩薩也愍衆生之造業示同類以化人罹罪而入幽冥懼苦而求救拔梵僧指示舍利是求覺而發心尋即改業化身應世暫為畋獵之民大士出家還作比丘之相於是北背并汾南遊江浙慕浮圖而顧盻念舍利以追尋萬里關山豈憚驅馳之苦數年道路寧知跋涉之勞由是登陟鄮峯徘徊玉几鐘韻忽聞於地下塔婆高湧於巖頭一片青山顯出千年之聖迹數重磐石長留萬古之神蹤從兹建屋度僧藉僧守塔地號東南佛國僧稱纍代人龍逮乎有梁啓運兹山之額號始彰大宋肇興厥寺之扁題重煥嘉祥屢發靈異疊生或𡸁相好於塔中或放光明於松頂或數旬禮拜慈親離冥報之殃或頻月熏修尊者獲印文之瑞乃至或燃一臂神歸淨土九蓮唐欽禪師于育王舍利塔前燃一臂求生淨土或捨全身親證念佛三昧明慧廣禪師禮舍利塔光中見佛乃悲淚曰某何德感如來希有瑞相遂焚身以報佛恩實賢自悲生晚不能親覩佛身幸喜緣深猶得躬逢聖迹于己亥夏特申瞻禮恭詣此山三月安居六時悔過但以凡誠淺劣難扣慈悲宿業深沉未蒙感應是以重述行儀再申懇到終身從事畢命為期不唯自省過愆亦與人同懴悔沉疴未起每憐同病之人浪子不歸頻下思親之淚文無足觀義或可取所冀障山翻倒轉成功德之山業海乾枯化為智慧之海六根都攝修淨業於此身三昧早成見彌陀於即世凡我同志毋忘此心同𡸁願力於千生共報佛恩於萬劫云爾贈荃公和尚住持方丈序自佛法入中國來寰宇必有花宮以奉佛又必有名僧住持以護衛花宮所謂住持者非徒供養守護種種莊嚴而已必能宣金石之微言示玉毫之真相三千大千之世界靡不瞻依四諦十二之因緣毫無凝滯而後克當住持之一席也若鄞之育王廣利寺乃供奉如來舍利為海內第一之叢林自晉太康歷六朝五代唐宋元明至我朝千有五百餘年凡見聞隨喜禮拜皈依者無不如親承接足頓破無明了悟法身余奉特簡作宰翁洲經今十載往返郡城省會每不歷蛟門之險取道於育王信宿兩宵非貪數瞻舍利喜寺中嵩來荃和尚通儒術書畫贍逸嘗與之茗碗香爐談詩説偈其法兄號遜安者寂處方丈無言無動無見無聞所有宏汲引以濟俗題究竟以開氓者悉荃和尚酬應而且積四方供奉舍利之香金闢拾翠樓五六間於西南隅又搆娑羅閣以補舊時之所有又修葺東偏大禪堂以備隨喜禮拜者之棲止又甃石明堂以新三摩地種八福田又遍搜殘碑斷碣以不沒前人之舊迹兼彰法寶之名區凡十數年來之苦行勤修皆主方丈者之所當留意而遜公深居簡出高清淨無為荃和尚惟恐泊與淡相遭頺墮委靡將千數百年之精藍一旦至於潰敗不可收拾亟出而一一代主方丈者為之則荃和尚固非佛所稱空生身子為長老而已乃善根夙植欲請佛住世常轉法輪俾一切恆沙人盡離苦海而登彼岸此雖起當年妙喜老僧大覺禪師再生今日宣微言示真相亦不是過也彼世之髠而緇不解空生大覺如海一漚而營營汲汲惟方丈之是謀與夫胸不諳儒佛書口不説仁義事踞名山木上座詡詡自稱為大和尚以傲世者倘與荃和尚同堂晤語有不赧然汗流浹背哉今復月遜公謝世丈室無人遠近僧衆與護法檀越亟請荃和尚繼席主持育王余與荃和尚交好多年頗如昌黎之於文暢永叔之於慧勤東坡之於佛印聞其於今二十六日進方丈何能默無一言苐荃和尚之道德遠勝乎文暢諸僧而余之為文書不盡言言不盡意深有歉乎韓蘇之洸洋雄放永叔之超曠清幽恐不足表揚荃和尚於萬一也或者育王所供舍利為如來法身常住不壞今文亦得藉舍利永留劫石中不等尋常寺院住持庸庸終歸於澌滅也夫文林郎知定海縣事今遷山西寧武同知羅浮髮弟黃應熊頓首撰遊育王寺鄭羽逵柴桑有處士匡廬足頻到最後成三笑笑意終不告今我非淵明偏有遠公導杖策入招提精力非妄耗石壇夭矯松素以放光號坐對足掀髯仰觀共欹帽舊雨話挑燈詩成語兀傲一笑瓦礫投竟得珠玉報嵩上人以詩什見貽嵩公和尚入城李海若孝亷招同人集雙桐齋時值新霽限韻謝山全祖望獻歲曾無三日晴黯然花柳寂然鶯高僧昨日來同谷春信連朝度滿城四座歡悰逢老友百年墨妙有餘清南皋于座中出先詹事公墨迹見惠踐先君之宿諾也幾時一葉褰裳去烏石山前啖笋羹和前韻陳汝登天愛良辰亦放晴月湖西畔囀流鶯青雲友集豪吟窟白足僧來舍衛城蓮社百年多逸興虎溪三笑遜餘清侵晨過我殊岑寂僅有東坡玉糝羹余亦芼蔬邀上人過雲在樓錢塘江候渡寄懷荃上人二首謝德星檢點遊囊卸竹兜渡頭潮落急呼舟離家到此方三日浪迹如余竟一鷗淺草平沙新驛路亂山疏樹晚江秋安身羡爾茆堂裏瓶鉢𡸁𡸁老貫休香尋鼻觀有甜藤斜日高樓想獨登塵土胃腸何處洗山川靈爽向誰憑自從雨榻零星話直到寒泉徹底冰壬子夏宿玉几山房劇談竟夜甲寅臘杪得訪嵩公一紙近來邀入社夢中顛倒失行縢時寄札相邀拾翠樓未及一登蘇長公宸奎閣記張無垢妙喜泉銘仆地已久乾隆丁巳冬豎之殿庭釋畹荃山靈訶護久能藏蘚駁苔侵歲月長異代重珍金石刻雙碑仍自立蘇張題無異堂乾隆己未重新無異堂後庭去其壅塞開闢窗牖堵間甃宋刻石碑手植牡丹海棠薔薇萱草杜鵑其上釋畹荃寺深最後無塵到地接煙蘿築砌臺背日古碑苔蘚合靣山寒影石房開竹翻曉露棲禽去風送晴簷乳鴿來惟有此心間似水數莖紅蕚傍墻栽元雪窗光禪師塔在鄮峯蒙泉之上迹已泯滅惟荒榛亂石中有斷碣存焉釋畹荃山靜徑轉幽泉澄魚可鏡振衣登崇岡羣峯蒼紫映方墳歲月深壞石塌危磴緬憶千載人瞻仰尚恭敬長吟發浩歌谷響前山應層崖媚如削孤月皎寒靚策杖晚歸來林端數聲磬寄懷嵩公和尚謝誾祚古剎明州數育王卅年前憶臥禪房至今塔影留殘照尚有梅花發暗香前遊以黃昏入寺暗中但聞梅香撲鼻坡老書從碑仰臥遠公骨共玉深藏謂秋公和尚屬君句就袈裟覆好讓松枝自放光寄育王嵩來和尚福國釋成傳三十餘年別鄮峯每于禪寂道情通匆匆老我風霜裏遠遠懷人夢寐中愁對暮雲停渭北欣看春樹蔚江東何時歡聚松陰下消去相思千萬重留別荃公上人二首范核寺門杳靄竹林間看慣春山近可攀舊倚石闌松不改新登樓閣翠如環孤燈仍照伊蒲饌十載應憐老鬢斑無奈來朝重別去曙光欲動鳥緡蠻一夜歸心動不休起看窗草碧悠悠子規聲裡春先去罌粟花邊客暫留雙塔沒雲孤棹遠寶幢臨水緑楊愁此行預報真消息菡蓞開從惠遠遊寄懷荃和尚錦如謝為雯深隱雲端玉几峯久思瞻仰末由從參禪獨對三更月覺世惟傳一杵鐘德望高同舍利塔文名焰敵放光松相尋擬負冬暄獻力勉雙趺策短笻過育王寺擎池傅德榮重到山中玉几堂愛觀秋水坐間房軒開靈菊恆呈瑞石挺蒼松屢放光曾記昔年貽妙墨爭看此日煥詞章摩挲碑碣驚三絶輝映前朝蘇與張時嵩上人新鎸塔記十景詩碑請啓伏以育王名剎創自太康舍利祥光明于震旦久為四海人天之勝地尤為一方因果之精藍非憑老柏喬松若神龍之呵護能免荒煙蔓草如荊棘之糾纏恭惟荃公大和尚幼擅人龍夙標威鳳蓄雲泄雨翠披玉几之峯巒浴日涵星光映金沙之井水指幡悟曹溪之句非風自翻立雪參少室之機無臂打斷早宜繼秋翁而為宗主溫恭偏讓于遜公今既虛丈室而當住持利人宜登乎法座况世尊傳有密旨信手已授今舍利遍現祥光覿靣莫遮羅扇伏祈紹智燈于鹿苑揚慧日于龍樓精義解頥處處一標見月微言折角人人五逆聞雷儼同菩薩轉輪超生生之世界不啻如來説法度萬萬之恆沙經等萍寓塵寰生浮幻泡深愧兩噓之未習敢希三笑之重新胡餅再拈何妨呷些汁下香梨飽喫也須還我渣來如是我聞最初事畢伏惟鑒納臨楮翹瞻髮弟萬經蔣拭之范從律全祖望邵鐸鄭性周定陳美訓周式雅陳汝登張士壇范基謝誾祚陳本醇李世法范城李昌泉張懋建李自新同頓首重建鐘樓記浙東西名剎五阿育王其一也舊有鐘元延祐年所鑄乾隆丁巳余過寺不見鐘樓問寺僧知康熙前壬寅寺燬于火鐘亦墮地在荒煙蔓草中者將近百年矣閲丙寅余再過寺見寺左有樓翼然主僧嵩來上人指謂余曰曩君來鐘在地今懸斯樓矣因備言建樓始末由乙丑春鄞邑令傅公柟至寺見鐘不列於懸捐資三十金令上人植木於殿為架以懸之上人念鐘高非樓不能容且殿為禮佛場植木架鐘不適於觀因鳩工庀材於青龍左方闢地建樓數十楹周以重簷繚以疏綺高三丈六尺廣如其長而減二尺經始于乙丑仲秋落成於丙寅孟夏樓既成懸鐘扣之噌吰之音四達計糜金錢以緡計者四百除傅侯所捐外餘皆上人衣鉢資也嗟乎方今梵剎圮毀寺僧視之如秦越不問也即假名修建募化所得亦先歸私槖餘方公諸常住如上人之捐資以建鐘樓者有幾人哉有幾人哉因援筆而為之記乾隆十一年歲次丙寅秋九月賜進士出身敕授文林郎內閣中書舍人改知四川成都府安縣事慈溪鄭羽逵撰同人登阿育王寺鐘樓蓉洲顧祖訓竹樹繞青山掩映重門秀幾年不到此蒼翠殊非舊矧復起臥鐘傑閣摩空構同人拾級登煙雲滿襟袖凌虛豁雙眸兩塔俯如就峭壁巉巖間蛟龍蟠古甃樹杪見田疇黃緑呈綺繡獨有放光松虬偃昻螭首翛然觀六合一指齊宇宙群坐秋水房春風納圭竇玉几老山翁動靜徵樂壽蘊古觸新機憑覽發清奏珠玉雖嗣音搦管愧孤陋無語贈溪山此來人更瘦寄育王嵩和尚雪竇釋明欣一機獨露法王顏不落乾坤萬象間祖席幾人提棒喝聲名千載播江山漫云別後離懷切𨚫恨春前把晤艱愧我乳峯多冷淡終朝抱膝掩松關寄謝嵩來和尚詩箑景文釋常觀一扇遙頒風送涼懷人句好意偏長筆鋒自有高王致詞藻掀翻屈宋墻憶昨來山瞻棒喝幾從望海挹清光相遺喜得詩中畫捧讀時時爇瓣香寄懷嵩公和尚集古傅德榮心無時事纍陳海樵得在玉几前鮑照松竹開幽徑吳警琴歌列梵筵陳子昻緑琪千歲樹楊炯明月一池蓮白玉蟾覺路花非遠楊慎間門鳥作緣吳凝父潛光隱嵩嶽李白芬馥邁蘭荃荀濟高論明秋水江總新詩動洛川韋應物丹霞非俗宇楊炯翰墨小神仙黃山谷海內存知己李卓吾春窗月伴眠白樂天阿育王寺瑞岩釋宗輝東塔凌蒼巘西樓控紫岑僧歸紅樹裏鐘出翠微深古殿層霄露穹碑撥蘚尋金軀遺舍利一到如今玉几堂看雪釋畹荃玉几山深一夜平花飛六出舞輕盈不聞凍鵲爭枝噪秖覺春蠶食葉聲剡水歸舟神自爽灞橋策蹇思尤清何如老衲安然坐吟對梅花絶世情題秋水間房六首釋畹荃窗外即青山種花復種樹鳥亦戀其中時共山人住豈是藏春塢繁花次苐看芙蓉醉未了南竺又微丹挑燈深夜靜蛩語自鳴秋千載名山志而今欲校讐山月低簷秋水清岩隈木石伴經行天如亦愛鷦鷯我寄一枝來老此生斷碣糢糊唐代石殘螭缺落宋朝碑臨池湊築重珍惜碎錦奇文千載詩階下一泓秋水緑芙蓉花近夕陽樓顛毛似雪盈雙鬢好友詩來懶倡酬寄玉几嵩公六首景韓杜琦棲遲海上十經年宦况鄉情共慨然聞説道人超物表幾回夢不到林泉尋來三度路非差童子開門識杜衙問取高蹤何處去東錢湖月四明霞隔年風雪宿山家著屐穿雲石徑斜行到上方鐘鼓動班班弟子禮袈裟時值戒期約我春前雪後來畫蘭寫竹蒼苔條風已變池塘柳暖日全舒官閣梅東風處處冷全消正日山房坐寂寥城郭經過人罕識何妨緩步出溪橋年來心事太無聊親老田蕪歸興饒爛熟世情愁不得遠公教我問漁樵
