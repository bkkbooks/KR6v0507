front:
  text: 釋畹荃明州阿育王山續志蓋續郭子章之志而作也本非獨立成書乾隆二十二年刋本乃正續合刻此續志解題併於郭志合寫不另撰一篇閱者鑒之明州阿育王山續志第十一卷目錄宋太宗皇帝御贊舍利宋英宗皇帝賜懷璉手詔奉使道中寄育王山長老常坦王安石與育王大覺璉禪師蘇軾戲贈育王虚白長老王安石與大覺禪師璉公書蘇軾寄大覺禪師二首王安石舍利塔記畧蘇軾與大覺禪師璉公蘇軾大覺鼎銘蘇軾與趙得麟書蘇軾祭大覺禪師蘇軾遊育王寺二首樓异和樓試可遊育王二首舒亶次韻知郡學士錢公遊育王山胡宗愈呈妙喜吳潜夏日遊玉几山謝翱寄育王賢上人謝翱題鄮嶺接待釋德光景德靈隱禪寺佛照禪師札佛照光禪師塔銘周必大西湖志餘云育王祭無極和尚無文燦笑翁禪師行狀物初觀上壑翁相國啟物初觀寄育王東堂釋文益䟦此菴師祖手帖釋清欲遊育王寺二首高翥橫川和尚住持育王疏釋道貫陪阮使君遊玉几山戴表元育王長老見惠茶瓜次韻奉答三首袁桷育王珙禪師示寂二紀嶼上人回山中因寄塔主袁桷偕劉胡二友遊育王寺朱右前題劉鼎前題胡璉贈育王肇藏主釋無愠謝天童平石砥問疾二首石室瑛阿育王古蹟詩六首無名氏大覺璉師以𨶒立本畫水官見遺報以詩蘇洵和育王十二題楊屯田
