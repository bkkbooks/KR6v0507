body:
  text: 住山釋畹荃嵩來輯集送君房之育王山嘉則沈明臣避地少人烟青山一笑便江村黃葉雨野寺白雲天閉戶觀秋水焚香禮太元即知能解脫何必定逃禪阿育王寺鹿園萬表避喧來海嶠元日坐禪林自笑身逃影還將景易心寒流春雪化叠翠暮烟深幽寂非人境應無積俗侵遊育王孔塘戎來賔古寺枕山阿巾車此暫過秋深紅葉亂天遠白雲多繞殿惟松檜侵衣半薜蘿來朝返城市清夢復如何阿育王寺夜坐季仲王思任大海繞空山高天當午夜有佛松不言無人月欲下何處領深秋此間從未夏急願寄如如景語終難借宿青玉樓沈明臣淨土誰開青玉樓白雲如水萬山秋高天西去空𩀱眼大海東來欲盡頭客夢梅花依木末禪心江月淡簾鈎遠公姓氏曾知否託宿吾將竟月留陪家四兄育王寺晚眺伯翼楊承鵾越絶千峯接化城清秋臺殿肅新晴人烟谷口蕭蕭見雞犬雲中寂寂鳴白社不知高士出青蓮空羡法華生匡家兄弟元同調一任廬山萬古名入育王寺二首少卿漢城余寅登登覺路寶幢平有竹扶人自在行不盡秋風吹古瓦半空曾放大光明高峯爽氣孤亭得九月寒空萬里清天地幾人逃幻劫不妨今日拂衣輕禮舍利西來舍利有還無金碧莊嚴極海隅萬里平分初地果千人真說戒壇珠浮圖寂寂燈猶朗法衆紛紛鼓自趨靈雨乍收清梵徹香花吹落白氍毹育王禮舍利蝶菴吳栩寶幢珠蓋護真藏一粒摩尼照大荒入滅止餘金粟影開函恍現玉毫光娑羅古樹高僧臘錯落天花滿法堂夜靜但聞鐘磬響毒龍猛虎盡歸降宿育王精舍天目莊學曾阿育知名剎春深度翠霞虛無憑玉几隱見出金沙𩀱塔浮空逼孤亭引徑斜松濤殷夜發臥聽欲無家觀舍利副使君衡周應治梵界超塵劫靈光乍有無真看金作粟始信玉為符晃煜銜龍燭熹微吐雁珠摩尼千古在皈首慧燈孤同黃省菴杜武川兩工部遊育王寺歸宿山莊遇齊李生時老人山谷最風流李杜兼成汗漫遊心遠正宜投寺僻花多應是愛春柔山空雲盡飛元鶴水漲沙平白鷗欲上蓬萊渺何處山莊高枕夢浮邱阿育王山光祿慕雲管大勳錫山標靈傑迢遞東南來鄮峯聳崒嵂太白障崔嵬金湖匯澄鑑玉几鋪平臺雲氣嶺頭分陽光谷口開中岩隱古剎高亭盻蓬萊梵音啓天籟塔影凌上台舍利藏精光佛迹印蒼苔神龍蟄沙井變化騰九垓烟嵐晴亦雨松風晝起雷山花空色相林鳥自喧豗蓮堂白日靜竹徑元鹿猜以兹愜勝賞車蓋常徘徊名巖無今昔塵劫有時災洞房幾荒廢孤雲自去回此中堪招隱前山有大梅靈菊軒記余因夢感修阿育王佛殿以萬曆辛卯十月十五日至寺憩真如軒軒前石欄列植菊花十四本六紅八黃又小三盆三本一黃二白諦視之紅心中凹瓣一一可數黃無心瓣圓簇如毬白似黃差小然其花繁雜枝葉不整潔不足玩也十八日太守日觀張公自郡城來顧同觀舍利塔既別去返入軒僧真實等譁聚石欄前指菊謂余曰此紅菊獨開黃花一朵可異也余聞花可接心疑之諦視之果枝顛一黃朵狀類紅而獨小不與他黃者類非接也心甚異之既而思之得佛理焉佛以真如最上覺為金剛體以心生計著煩惱為火宅以清淨身心為入佛乘以無住而生為圓滿智黃者金也白次金也紅則火也盆一黃不與八黃列而無異八者無等等覺真體也二白清淨已離於火而未成真大小二乘也六紅有心而瓣有分別相六根煩惱火宅也八黃無心而瓣簇如毬轉八識為圓滿智也紅中忽一黃獨小其一根獨返源而六根成解脫乎於是可以證八智超二乘登等覺矣余於是心敬之不敢褻視謂聖溷于凡而凡具聖當亦如此菊矣於是日玩之目十八日至十一月初七日長至紅朵萎盡而小黃朵獨鮮喟然歎曰兹非塵銷覺圓淨乎余每觀舍利變幻心疑之今此菊從紅出黃殆佛以此釋余疑也已又思之菊歷春夏及秋末始花而入冬尤盛於化工甚備六陰盡衆芳皆萎而菊獨榮不滅也一陽生衆芳皆萌而菊則萎不生也衆花萎皆落地而菊不落不去也衆花落皆結子而菊不結不來也餐之酒可以明目不昧也服之藥可以延年不壞也五色皆有而獨以黃名萬行具足而中體不改也雖微今日之變異佛理固具焉而况變異昭昭可覩若此哉衆咸疑舍利愚謂有疑於舍利請觀之菊有疑于菊請觀之舍利悟則物物皆舍利不悟則舍利亦物舍利出佛身乃曠劫之菊此菊入余目乃一時之舍利菊與舍利是一非二又其必待余來乃現類佛以菊語余而又欲託余以語世余故不得不為之記嗟乎凡學佛者皆曰尋本來靣目其亦尋之此菊也已於是又更名軒曰靈菊即說偈言而書之於壁佛體本如如逈無前後際應身示天竺寂照含大地無餘入涅槃不壞遺舍利十九入閻浮一塔踊晉世至今千餘年往往出靈異心目所共瞻人我獲兼濟信念力自堅疑情亦相繼余本業儒者晚忽解中諦如幻一親觀倒夢期遠離辛苦見思惑艱難究竟義詎意石欄栽即是金鐘係真無豈虛空妙有非安置人力偶爾排天機自然具一盆衆中尊二白垢盡去六紅列火宅八黃表圓智紅中黃忽生漸與頓皆詣斯須獲超脫煆煉隨根器諒惟神轉移容假人思議經律未討論法旨先昭著造化謂無工於菊良有意此花色已真彼珠光曷僞花與珠成同物與花相類信知妙湛性平等周一切匪實又匪虛如明復如昧心智倘鏡淨花珠皆筏喻禮塔事猶間對塔功須致正恐墮疑魔寧憂乏補處普願道眼開毋令玉屑眯初觀時賦八律寒冬禮佛到禪房紅菊中開一朵黃豈謂根塵堪解脫故令金質露微芒真如獨立銷香熖火首周圍捧法王始信妙心含妙種不須雨露不辭霜阿育王山舍利奇萬人半信半猶疑何如火裏藏金色恰似凡軀顯聖儀昔日元珠毛孔落此時黃豔菊枝移藥欄寶塔居然在目覩威靈心自知一花一卉只尋常似有神明為主張看菊開時渾是赤待余來日忽成黃希踪偶與行期會異事從教法界揚共道此花真舍利至心皈禮莫能忘萬象身中獨露奇每聞此語尚懷疑庭前柏樹亦禪理砌畔菊花非化儀紅忽黃時忘次第黃從紅後漸遷移分明說法無言語注目寒枝才得知纍纍菊蕊簇紅粧忽著枝頭一黃豈是花神呈變態祗緣佛體吐光芒哀求不藉賔菩薩收貯無煩阿育王最是二旬群萎後猶然鮮潔獨凌霜不壞金身處處藏遍周沙界遍金剛菊花亦是菩提樹石砌原為般若場變化有時多幻迹元精無見總平常欲知舍利今何在指松枝也放光菊分黃赤未為奇一本𩀱開似可疑本處正如含藏識開時還似四威儀靈根入地誰分剖異色驚人孰轉移方悟無修亦無證由來此意少人知真如無色亦無光豈有紛紛赤與黃自是虛空原不動何妨星電各𡸁芒由來菊備四時氣合作人間百藥王好與石欄勤衛護勿令摧折向氷霜萬十九年長至後二日偶作承余漢城學憲遠惠素卷命筆書之留為阿育王寺故事賜進士出身朝列大夫南京國子監祭酒前春坊諭德掌翰林院事中允兼編修經筵講官同修國史直吏曹館奉川戴洵識靈菊余欲拜舍利倣徉到育王笙簧奏松裏錦繡茵石旁有一景陽僧引人靈菊堂試問菊何靈答言實異常所栽本紅種開時一朵黃正如衣黃者赭袍侍廟廊初開殊可怪徐思理自彰此花本隱逸嘗栽五柳莊誰知千載後上人踵其芳我昔遊金陵聽法聚寶岡高陟花雨臺生香襲子裳胡期來寶幢復覩此靈祥豈亦曇花墮吐出金珠光我有觀花齊紫英改素粧怪其失故態摘之令不揚考彼月令秋菊宜艷中央中央是正氣變幻夫何妨吾齊若遇之當令繁且昌拾之以自佩于以分餘香上人了正義靈菊應煌煌傳燈原有藉固知續景陽御賜貞白高士慈溪七十一翁馮柯育王殿宇重新聽冲法師講經農半周應辰不任靈山去海忙恰能駐嶺拾雲藏如鐘靜矣𩀱懸塔象几天然獨對堂草遍庭心無相相花吹谷口有香香此來開示佛知見會得當年亦在傍寓廣利寺贈柏亭上人光祿會之吳禮嘉征鞍千里解秋風暫洗紅塵入梵宮野鶴巢雲𩀱柏古疏鐘度月半庭空慧光熌熌分曹洞風骨凌凌識遠公愧我宰官身未度本來真性自圓通觀舍利塔侍郎栩菴林棟隆香臺法相現嶙峋靈塔飛來多寶新不滅不生皆覺路非空非色即真身毫光白玉諸天出祇樹清陰四望均翠巘斜臨開玉几大千世界轉金輪贈育王曉上人石盂山人汪坦當年海上看降鉢此日隨雲度石城千載重來折蘆處月明沙白草青青過玉几松堂見先文定留題感而踵韻長君張茂之夢入名山又十年於今登眺可逃禪流雲影落疏松裡過雨痕收淺水邊鳥道琴樽橫玉几月催鐘鼓直金仙何期手澤留方丈感慨重題修竹前舍利殿記鄞令王章嘗曠覽平原憑臨大海望白波浸山黃烟慘日一切城郭阪隰人物蟲魚往古來今與塵起滅者俱倐焉幻化耳蓋五欲塵勞六根煩火游戲諸相如業鬼借宅捨身受身寧有休歇一旦眼光墮地手腳忙亂此時摧撞息機晚矣辦一日資糧庶留一日掌果若食橄欖正酸澀時勿得吐𨚫勿遽作不酸澀想久之帝座非遙浮雲轉低鬚眉不小六合猶隘禪家定慧與吾儒安慮其理一也余蒞明州之鄞去城五十里有阿育王寺則住世之釋迦舍利塔存焉由晉迄我明一千二百餘年矣可使八塔造八萬四千塔而萬塔一塔可使五指放八萬四千光而無光有光為光在塔何以忽涌地忽入海忽飛屋上忽重登舟塔異而光不異為光不在塔何以忽如石忽如雪又忽如月輪相如水晶珠光異而塔不異後有權貴至寺戲問舍利何在笑翁指道傍松曰此處即有已而松枝皆放光然則舍利之在震旦者一十有九惟阿育王山顯著特甚滿大地山河皆松枝則皆舍利而已滿凡夫愚婦皆松枝則皆釋迦而已是故勤修身而緩稽效其人誠也光如其分量以應焉其人尤誠也光亦如其分量以應焉光自心發光自心見語云不欺于火滅而後日中不怠不怨于家人而後明王敬之夫行之知之不重難哉我輩魔重甚麼鶻臭布衫破驢脊背何時打串乎元次山有云我目我耳我鼻我口目不隨視耳不隨聽鼻不隨氣口不隨言則吉祥殊勝只在本地浮屠鐵鼎到處風光古人謂達摩治三軍與檻彌坐胸中景象大可參照否則鐵蛇入竹筒雖看盡三乘十二分教聞盡一千七百則公案何益焉料理末後著子冷暖在心餘俱閒事直以參釋迦未生的人可爾是塔也歷傳供養䖍禱輒現昔稱梁皇宣宗及武肅宋高等莫不以慈悲願力攝受皈依然而造塔者周厲王時東天竺國之阿育王是也求塔者晉太康時并州獵師改號慧達而湧出鄮峰之劉薩訶是也豫自暨來鄞數年於兹從瞻禮之餘往來娑羅樹下恆美生流唱歡動誠心謹齊沐而為之記記畢誦曰樹古庭空雲消天淨靈塔在東夕陽在西附宋左街僧統贊寧寶塔傳補遺傳前闕詩五首阿育王寶塔者乃如來真身舍利所藏處也昔世尊入王舍城乞食路逢童子聚沙為戲見佛威儀心生歡喜即以沙土為麵殷勤奉施佛授記曰此童子吾滅度後於閻浮提作鐵輪王有大威德四大洲中悉皆臣順取吾八塔真身舍利造塔供養佛滅度後果符昔記阿育王有大神力能役鬼神於一夜中碎七寶屑成八萬四千寶塔彼時有耶舍尊者於五指間放八萬四千道光明諸天夜義衆各隨光中往四天下遇八吉祥六殊勝地乃安一塔今皇宋輪王統領國土有一十九所顯晦不同其顯者與國為福與民為利也若明州鄮山所現者乃其一也西晉太康中有劉薩訶者并州離石人生在畋家弋獵為活得病至死見一梵僧語曰汝罪深重應入地獄吾憫汝故宜往洛下齊城丹陽會稽有阿育王寶塔處頂禮懴悔得免此苦既蘇改業出家法名慧達或云法達如指南行至會稽海畔山澤處處求覔莫識基緒悲惱煩塞投告無所偶於一夜聞地下鐘聲即精誠懇切經于三日忽舍利寶塔從地涌出光明騰耀塔相青色似石非石高一尺四寸廣七寸五層露盤四角挺然四靣窗虛中懸寶磬周以天王及諸佛菩薩善神聖僧天人等像相極精細瞬目注睛見八千像狀咸悉具焉可謂神功聖績非人智之所及也達既見塔悲喜無量晝夜精勤禮拜懴悔瑞應頗多按傳中劉薩訶者乃利賔菩薩示現豈偶然也鄮縣古城在勾章東三百餘里其寶塔即縣界孝義鄉也地志云阿育王造八萬四千塔此其一也輿地志云釋迦弟子能役使鬼神一日布于四天下造佛骨寶塔八萬四千皆從地出會稽記云東晉丞相王導初過江時有道人神采不凡言從海上來相告曰昔與阿育王同遊鄮縣安真身舍利塔阿育王與真人捧塔飛空入海諸弟子攀引不及一時俱墮化為烏石石如人形名僧傳云昔有神人捧塔飛行海上弟子中有未得道者墮地化為烏石猶作人形上有袈裟紋縷郡守褚琰遣使取看奇之至今村名塔墅嶴名烏石也晉義熙元年安帝敕於鄮山造塔亭禪室度二七僧住持守護宋文帝元嘉中遣陳精并僧道祐廣興創建鑿基下得大石函盛玻璃鍾覆以銅鏡又以金合盛銀罌安三法身舍利并迦葉佛爪一其色紅髮一莖伸之數尺置之成螺劉宋文帝詔造木浮圖三級藏之厚賜供給竟陵王發使奉珍異供施聞三級木塔未至崇敞欲增成五級忽夢神人告曰阿育王塔無用增修王問其故答曰三十年後有大力人興世增添耳梁武帝普通三年敕建木浮圖堂殿房廊賜額阿育王寺著作顧允祖作碑記記之大同五年上座僧綬奏木浮圖隳損敕嶽陽王蕭𧦴增修至五層施黃金五百兩鑄金銅像四百軀寫經論五百卷鑄四大鐵鼎以鎮四角敕孫昭凡百供應付武帝昭明二真安於塔內蕭𧦴取石函內舍利三顆浴之咒曰浮者進上皇帝其最大者浮遣主書吳文寵僧璉等四法師同進因敕免莊賦調給兵士三千人於寺外莊置營防衛定襄侯蕭祗陳留阮孝鄮人黃璣會稽太守蔡興宗散騎常侍王仲和太學博士顧諧東宮直侍王仲達並梁朝名士悉傾心皈向陳宣帝遙敬此塔度二七僧越州昌樂公楊异勾章令袁不約信向尤篤唐太宗世鄮縣令王昭遊禮近寺望見木塔第三層上有二人立皆舉手托四級西南角遂問僧智悅曰何人修塔答曰不曾修因說所見遣人上塔驗之其四層西南角㭿栱果壞令曰善神示之欲弟子修耳遂即修之敏法師領徒至寺一月敷講道俗聚集夜中有人見百餘梵僧繞塔行道以此詢衆寺僧曰此常有之永徽元年會稽處士張太元到寺禮塔與僧智悅連床寢息半夜聞塔前誦金剛般若了了分明二人往看一無所覩𡸁拱二年越州士曹唐元默迎塔到州精嚴供養女壻楊氏醉入道場寶塔忽然飛去元默驚心作禮悵望乃見在西家屋上即送還本寺中宗皇帝遠加敬仰敕送供施仍降詔委棲曠和尚如法香火國清智晞尊者到寺禮八萬四千拜旋繞數周忽感紫文印于右臂方整明亮終身不沒臨終謂弟子曰衆聖封印心無虛焉吾定生彌勒內院矣肅宗朝內供奉子璘者州人也歸省所親經宿嶽廟神人告曰汝母在此受業璘聞悲不自勝乃問曰我母何罪而至於此神曰為師少年頭瘡多用雞白調藥療之因招罪苦璘告神釋免神曰罪係有分免即何緣若要免之往鄮山禮舍利寶塔璘徑到寺方禮四萬拜母於塔前雲裏現身曰吾承汝力已生忉利璘遂止寺終身禮敬唐僧宗亮詩云鐵輪王使鬼神功靈塔飛來鄮嶺東有客不隨流水去磬敲疏雪淡雲中武宗澄汰沙門塔止越州府庫宣宗重興教法塔入開元寺鄮山論請開元固執觀察判官蒯希逸判云譬如人家寶物失之多年本主既認便須給還太守王龜依判遣送歸育王大中庚午歲正月齊日八千許人傳塔供養天花紛紛而落其花如雪衆以手擎旋即鎔液至夜初又放五色光明是年有新羅僧夜入盜塔手捧繞亭亘夜而行不離本處懿宗咸通中觀察使楊嚴奏舍利寶塔靈異實國內福境敕度三七僧精嚴香火天祐中太守黃晟本奉化人也迎塔往故鄉供養上船頓重加人助力亦不能舉晟嘆曰地薄無緣遂止錢武肅王貞明二年丙子十二月遣弟鏵并僧清外鴻澤等具船舫香花迎舍利寶塔明年上元夜回止西陵岸放光照明江中如晝武肅王躬扶彩輦從行至羅漢寺廣陳供養一僧頂戴手搦一角忽然墮地隨手安著屼然不動僧統今諲至晚䖍禱遂見其角火星迸散始知神力補鑄耳丁丑歲敕造木浮圖九層戊寅二月八日畢工四月八日安舍利塔第三層七寶龕中爾後纍歲凡大會齊日多覩光明錢文穆王深加禮敬以職事殷繁請僧代禮寶塔其誠信如此元帥大王戊申重修彩繪其年九月二十六日放大光明周顯德戊午歲二月中翰林承㫖陶來錫命禮入寺敬禮見舍利紅色自謂吉祥再拜不已副使司天少監同至謂知塔大師義倫曰是塔必不傾側它日必平陷耳至今四月十一日果為延火所焚舍利寶塔迎在龍華寺壬戌歲王㫖再造木塔遂于第二層安貯中龕百寶莊嚴觀瞻者亂目設黃金寶座掛懸珠玉元帥大王因覽大衆毗尼部見吉利王為迦葉佛造塔金薄覆上尋遣指揮使凌超重加甃砌莊飾造檀香殿雕鎪精麗百寶珠瓔風觸振響音如天樂別造金塔極麗窮華設使湘宮往製胡後前規亦未足侔也且舍利寶塔世人少知靈異據感通傳天人曰今鄮縣是阿育王古塔小塔是賢劫初佛者有迦葉佛臂骨非人所見羅漢將往鐵圍山若究此文則有二塔一將往鐵圍是迦葉佛骨一劉薩訶求出者是釋迦舍利乃即今人天恭敬者且以神功不朽歲記深長雖補前文難述未來之瑞應更祈後哲好編無盡之徽猷贊寧想乾筆之餘慮多𨘤墜仰炎宋統天之思欲播揚與劫齊修惟高不動者也時開寶五年歲在壬申正朔撰宋孝宗皇帝賜佛照禪師補遺大暑流金石寒風結凍雲梅花香度遠自有一枝春登阿育王塔孝亷李德愛徑僻長蓬茆藤蘿上塔稍洞深蛇作窟砌古鶴為巢石檻嵐常閉金鈴風自敲回頭看絶頂疑鎮海門蛟佛蹟亭李德愛遊罷攝輕衫攀崖探碧岩蛟門飛霧雨鳥道阻松杉石豈人工鑿真如佛蹟函何年留一足永𨚫謝塵几重過育王西塔院三首鄮山周容野鹿隨雲下簷禽識磬還兵戈成就我得遂此中間秋茶出釜緑野子插瓶鮮但尋幽事洽未敢竟參禪空廊積莓苔虎跡大如鉢忘機忽過橋明月照林末登阿育王塔霞嶼方劬山高遙萬仞有塔同山齊登級三五層已見殿閣低我欲觀蒼旻上此萬丈梯仰視日欲尋空中氣慘凄薱山岩欲墮飛泉趂石澌從高望其下但見為塵泥山花處處開林杪子規啼泉鳴幽谷中平沙走長磎四顧但一氣不復辨東西阿育王山阻雪于石釋德介春初頻作客樹樹有梅花寒鳥棲無定流雲凍自遮是山成玉几何地辨金沙不覺疏窗下悠然竹又斜西塔院訊太初老宿釋德介昨來自太白峯峯雲起時同人已前往問余欲何之摳衣度石嶺見塔如見師故情何傾倒香茗復自炊示我山水冊筆墨多古奇泉石有異質幽鳥催新詩聯床一夜雨蕭蕭在竹枝丁丑夏日北上過育王別秋遠和尚二首偉載釋元乘又有長安此一行匆匆話別畏途程車輪馬足風塵裏玉几時時憶舊情指松之處話斜陽松老𡸁枝色更蒼正值山中剛五月一林梅子勝花香明州阿育王山續志第十四卷目録明州阿育王舍利塔圖讃有序莊坰生遊天童道經育王杜漺阿育王寺釋通門草堂釋通門宿舍利塔下尋古碑李鄴嗣鄮峯草堂李鄴嗣同董曉山周方人登阿育王塔周斯盛陪𡵆公訪嵩巖上人題塔二首張鶯過育王贈法鐘禪師釋本僼寄育王嵩巖和尚釋超寤新纂鄞縣志汪源澤呈法公謝歸昌冒雨過鄮峯訪法公留宿山房謝歸昌賦得阿育王舍利寶塔謝秉昌家弟維賢瞻在文國過玉几松堂止靜余不及從得排句十二韻謝秉昌禮舍利元盛阿育王禮迦文舍利塔元璟放光松元璟約謝子維賢同遊阿育王寺姜宸英春日禮育王舍利詩以志勝陳其愚秋遠和尚繼席育王里言奉寄邵似歐送法老和尚還掃花居謝景昌育王移山梅一本於樹滋堂二首謝兆昌寄法公和尚二首謝兆昌呈法公謝秉昌遊育王贈東堂法老和尚裘璉重晤法和尚於蛟城二首邵似歐法公自都門歸鄮峯𨚫寄邵似歐阿育王寺瞻仰舍利溫應㠐寄育王法老和尚溫應㠐雨中過鄮山宿玉几松堂謝秉昌懷秋遠和尚溫應㠐過育王晤遠公和尚二首邵似歐過鄮峯呈遠公和尚謝歸昌春日再訪遠公邵似歐山居得秋遠和尚書漫賦二首謝師昌遊阿育王寺張士塤秋杪從天童過宿育王用歐陽公憶滁州幽谷韻呈秋遠和尚李暾前題張錫璁前題等月玉几峯三首仙人書般若塔秋遠碧放光松歌謝緒章送秋公法姪和尚歸鄮峯超寤過育王呈秋遠和尚二首李暾小育王感懷三首七佛潭袈裟石秋遠碧春日過鄮峯同省齊和尚斯敏法姪坐雨兼懷秋遠法姪超寤寄育王嵩來上人二首張兆林從天童過育王依韻奉酬嵩公彭祖訓贈嵩來上人周鴻憲嵩公以詩見贈次韻奉答張美確偕董天池不磷遊阿育王寺范桐玉几松堂同李東門看雨萬承勳前題李暾鄮峯草堂二首嵩來荃
