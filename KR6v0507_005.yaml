body:
  text: 住山釋畹荃嵩來輯集舍利懴儀序釋成皎葢聞法身非相因感乃形神智無方待叩斯應良由機分小大則見境故有差殊障別重輕而覩相或成同異實當人之自爾非我佛之使然至若情存敬信在木石亦可開心意兆乖張雖真儀猶難啓悟是則理隨事變法從緣起者也然又微生簡褻禍不旋踵甫事修崇福堪立召阿育王作八萬四千於世殺罪尋消阿育王殺八萬四千夫人復於城外造立地獄治諸罪人耶舍知王殺罪應墮地獄即遣比丘化王生信王悟問比丘言殺八萬四千夫人罪可得贖否答言各為人起一塔塔中著一舍利罪可消耳王即尋覓阿闍世王所得如來舍利分與鬼神令各還所部於一日之中立八萬四千塔滿閻浮提世間人民號阿育王塔隋高祖立八十三塔於州親恩遂報皇帝於仁壽元年六月十三日御仁壽殿即降生日也歲於此日營造福善報父母恩延諸沙門與論至道遂於海內諸州選高爽清淨三十處起舍利塔以十月十五日正午奉迎舍利一時起塔並現靈瑞次年正月二十三日復分舍利五十三州故前後共有八十三塔也劉薩訶地獄之苦藉懴悔以得除西晉太康二年并州弋獵劉薩訶暴卒至地獄見觀音大士謂曰汝罪應入地獄今洛陽臨淄建鄴鄮陰成都五處有阿育王造佛舍利塔可往瞻禮其罪得滅既蘇出家名慧達即往會稽山澤處處尋覓至鄮縣烏石山聞地下鐘聲懇求三日地湧方壇斵土得舍利寳塔青色是石非石高一尺四寸乃西域于闐國造可謂神功聖迹非人智所及也達就塔建精舍殷勤禮懴瑞應頗多愚按西晉時鄮縣隷會稽故鄮縣舊為越州之地言鄮縣者有山曰鄮故以名焉鄮縣今浙江寧波府鄞縣是也迦羅越雨寳之因由供養而克致譬喻經云阿育王國有迦羅越其人福德世間希有意有所須應念即至阿育王聞使召見之越知王意便於王前以手東指即時空中七寳雨下不可限量餘方亦如之王問羅漢答云過去九十一劫毘婆尸佛入湼槃後迦羅越以七寳及取好華上塔四靣散下而為供養即𤼵誓云使我世世食福自然由是功德唯受勝福刁逵殷請分一為三晉義熙元年有林邑人某者得一舍利每於齋日放光沙門慧邃隨廣州刺史刁逵在南敬其光相欲請之未及發言而舍利自分為二逵聞心悅殷勤請之又分為三即模長干佛像以舍利著像髻中僧會誠求應前及後吳赤烏四年外國沙門康僧會創達江表設像行道眾以為妖權召會問曰佛有何靈瑞曰佛晦靈迹遺骨舍利應現無方權曰何在曰神迹感通祈求可應權曰若得舍利當為興寺經三七日至誠求之遂獲瓶中旦呈於權光照宮殿乃為立寺名建初後孫皓虐政欲除佛法有臣諫曰且少寬假如無神驗誅除未晚皓從之召會曰若能現驗助君興之弗則國有常刑一眾驚恐會喻之曰佛留舍利止在今日前已有應後豈罔哉恰期便獲皓乃欣伏革誠應化魏明帝生疑欲毀知神効而崇尚益堅魏明帝洛陽城中本有三寺其一在宮之西寺僧每繫舍利在旛剎上斥見宮內帝患之將毀除時有外國沙門居寺乃齎金盤盛水置舍利於中五色光明騰燄不息帝見歎曰非無神効安得爾耶乃於道東造周閭百餘間名曰官佛圖精舍由是信道彌篤馮元嗣乘怒將焚受冥罰而歸投始復歧州歧山縣人馮元嗣者素性强暴母兄承舍利來欲修禮敬元嗣怒曰此有何驗而禮敬之若舍利有功德家中佛像亦有功德先取佛像燒之將毀舍利忽暴死經三日復活云我到一處似是地獄有大鳥飛來啄睛噉舌大火燒烙眉髮皆墮又被杖打由是請僧懴悔對舍利前號哭自撲後得稍安未經一年竟死法顏興砂石之歎光發回心晉竺長舒得舍利寳之其子為沙門名法顏每欲歸俗因歎曰舍利砂石耳何足為貴伊父投之水中見五色三帀光高騰數尺法顏見此異徵而歸俗之心遂寢徐椿讀梵莢之書信孚現瑞宋高平徐椿初信佛讀經得二舍利著罌中漸增至二十後寄廣陵令劉馥馥私開之唯空罌椿在都忽自得之葢法寳應世祥瑞益蕃大都皆敬而得之慢而失之者矣於戲靈蹤既夥不盡身經神異頗饒難為言備夫舍利東流綿歴聖代傳記所載亦不備詳然有國興崇無尚於隋散諸海內莫可徧經且神瑞開發未易周知俱非筆舌所得盡述者也今畧陳梗槩使敬者慢者知有禍福存焉耳成皎不揣固陋僭述懴儀理或闕乎觀心文實塵於視聽只合退藏自課豈敢出示同人然皆本夫聖經並非專於私臆行將息影於玉几山側摩騰謂漢明帝曰阿育王塔震旦有十九處大士告劉薩訶曰洛陽聖塜建鄴長干鄮陰玉几臨淄成都五處有阿育王塔按鄮陰玉几者玉几山名山形如几在鄮山之陰故言鄮陰今鄞縣阿育王寺案山是也劉薩訶求得舍利供奉此處今塔現在有悔罪者時可申誠故我四明月波磐法師佛祖統紀云今十九處不可備知而考之五處唯鄮陰之塔顯於世間可得瞻禮信乎海瀕羣生末代值佛之幸也攝心於窣堵波前梵語窣堵波此翻方墳又翻靈廟言塔者具云塔婆此翻高顯然建立佛塔其意有三一表人勝二令他信三為報恩又云有舍利者名塔無者名支提此翻滅惡生善處切柏代香終朝伏欵捲簾進月永夜抒誠破黑業之重關顯明德於靈府適彼樂土實獲我心隨喜見聞咸資妙證云爾同人由天童至阿育王寺周池董胡駿覽勝何知村路長相尋老樹正蒼蒼山憑玉几當門翠水繞金沙滿磵香殿指劫灰存古剎龕藏舍利有神光吾生自媿躭塵俗白髮方登選佛塲前題鹿書吳毓賢深山𥦖窱路偏長竹樹蒙茸色更蒼𩀱塔髻分凌漢古一池鏡淨帶花香到門目奪虬龍影入室神凝舍利光半日相羊一宵宿恰勝詩酒萬千塲前題李暾出嶺沿山一路長到來紅日未蒼蒼零零落落山楓老小小黃黃野菊香遊屐連朝無雪氣碧天萬里有春光追陪行樂人間少歴徧東村古道塲放光松董胡駿古樹鬱輪囷盤根無齷齪種植忘歲月風雨歴晦朔憑依有神靈奇異顯禪覺千尋勢倒垂百圍手難握老𠏉翠欲流新枝秀可撲蒼龍已脫鱗潜虬猶露角來觀愛摩挱詠歌費雕琢入山為此君安能來數數放光松吳毓賢太白見古松胷已澣齷齪兹松更奇古知歴幾望朔傳聞舍利光靈踪現先覺飛龍擘晴空紛拏難把握連蜷曲復曲枝枝向人撲何年植山阿巋然峙殿角樸拙自天成不假人力琢我今始見之安得往來數放光松李暾眼內現玲瓏心中忘齷齪茂滋春日和勁敵寒風朔我來即起濤物靈竟先覺頻頻以詩賦神奇難把握胡為千萬枝盡向一邊撲地力幻虬龍天生異頭角今宵擬狀之又費空摩琢吾年衰老矣還期過數數入阿育王寺邑令何鉽幾日禪關愜素心溪邊清趣竹邊陰追尋且遍遊山屐那怕紆迴曲徑深標格亭亭逈出塵翛然物外見天真謂嵩上人案頭積得詩千首露浣薔薇不厭頻陪葉芬洲中鎮自太白過育王錢際盛傍蚤呼輿出嶺來將軍遊興亦雄哉竹陰一盡竹兜穩石塔𩀱標石逕開風過魚腥留客盼碑殘鳥跡儘人猜秪憐善病維摩瘦時嵩上人患瘧懶去山門掘芋魁宋塌唐碑舊有聲火雲刦後僅徒榮惟餘老𠏉虬松古長對清流碧沼橫玉几喜開新氣象時嵩上人方新葺玉几松堂濤箋還是昨題名正宜結伴同觴詠又苦匆匆入郡城涌現巖釋畹荃遠脉分天竺靈山接越州光從耶舍至人自薩訶求塔影藏山骨鐘聲到海陬剎竿當此建卓立已千秋玉几峰太古兹山在重重翠色濃渾如蒼玉琢自有白雲封樹密藏文豹泉深起蟄龍吾宗門戶峻堪對此高峯金沙井自古能神應澄泉在碧嵌山川遺勝地碑碣豎重嵒雩祭潭雲黑靈翻海雨鹹空亭斜日外古甃石巉巉放光松光放三千尺形奇六百年高枝幾墜地老𠏉欲叅天霽夜亭亭月晴春曖曖煙幽人紀妙絕吟就占松篇赤堇峰赤壤多靈草崖根出劍精地從山勢結脉向海門生甬水春流合蛟川夕照橫蒼蒼翠微際一路有鐘聲越絕書云赤堇之山破而出錫以造寳劍佛蹟亭曠刦曾來此遺踪不可磨荒亭圍草木古壁繞藤蘿鳥向雲中去人從樹杪過回看百年內塵裏擲如梭鬼谷祠何使秦儀輩縱橫七國兵高風存古廟深隱憶陽城野水數圍曲荒原一望平春來祠宇外寂莫有啼鶯在寺西南白雲山望海亭危亭登一覽與世隔塵泥曉日滄溟外長江赤堇西地連吳楚遠天近斗牛低極目窮三島何須跨海鯢妙喜泉繞徑多蒼翠莓苔處處侵一泓清且潔千尺冷偏深石妙當年句泉澄此際心堅珉重拂拭細讀漫沉吟袈裟石蒼蘚雲根石空山歲月長孤標青似鐵羣臥白如羊蘇供何曾喜秦鞭豈復傷袈裟千古蹟任世閱滄桑禮舍利塔定海令黃應熊輕㠶便捷渡汪洋彼岸登時到育王竺國何年來舍利浮屠今日放祥光峯環玉几千尋碧水漾金沙一派黃勝蹟奇觀殊可愛石壇松樹正蒼蒼禮舍利塔湘南釋成衡纔覩金鐘掌上擎恍然似覺六銖輕乍看白色何其皎俄吐紅光分外明桂魄自從銀漢出龍珠宛在玉盤行奇哉再拜方翹首纍纍松枝綴水晶放光松鄞令李寶黙育王有古松觀者皆稱怪其名曰放光根深體自泰獨立寺之中高出世之外弗愁風雨侵不畏雪霜害大小千萬枝上下總一派望之倒欲眠挹之俯如拜左右倩扶持非因老而憊鬔鬆貌不凡團圞蔭非隘彷彿一頭陀趺坐胸無介我來與盤桓竟日興未艾忽然萬籟鳴心目益為快和李拙園寅長原韻黃應熊松乎名放光幹老貌亦怪倒壓百千枝屈曲安而泰堅實積於中英華發於外根本既不搖斧斤又無害恍如山之環恍如泉之派恍如龍之蟠恍如虎之拜俯視世一切𡸁頭豈是憊天地不見寬斯壇不見隘四時不改青三公不易介日月與同光蒼蒼寧有艾玉几我常來我來松亦快松檀銘并序釋畹荃宋淳祐間笑翁堪禪師住持育王時樗寮張寺丞即之問道於師不異山谷之厚於晦堂嘗往來玉几甚愛此松顏其室曰玉几松堂一日明守騶從入寺絕不與師語偕至松下忽問曰舍利何在師以手指松曰見麼已而松枝纍纍如水晶珠光曜爍人放光之名實始乎此後笑翁謂樗寮曰此松着地吾當復來此事載在物初賸語嗚呼松之名聞海內久矣康熙甲午春先師秋老人謂荃曰吾於松下已築一壇但未砌石耳子當為吾成之荃即命工甃石加石欄于其上因為之銘銘曰玉几之松𡸁千年霜皮老𠏉金石堅盤柯詰曲何蜿蜒卻如蛇蚓屈復拳奇形秀㧞名山川風雨忽疑龍出淵摶風攫霧勢叅天交枝驟葉生雲煙摩挱相對綠陰前築石為壇供嘯眠當時此處集高賢太守曾叅一指禪須臾光放五彩鮮枝枝葉葉寶珠懸俯仰今昔歲月遷清濤謖謖生層顛芳名奇絕千載傳異代應須琬琰鎸放光松泉聲釋元煌梅竹參差繞萬枝奇松中立最相宜自能夜逼星辰冷誰覺春回日影遲指處尚云當此處種時已定有今時𡸁𡸁古𠏉真堪畵畵裏傳神莫過詩放光松介愚釋元晟慣經霜雪老虬枝卻與東南古寺宜托跡偶因人信淺品題無拒客來遲一池湛湛忽為影千尺亭亭非傲時舍利有光還在否我來瞻禮漫題詩放光松雪艇釋元訪昔年指點老松枝磊落光交色更宜百尺凌霜寒日靜幾經寉唳暮春遲輕陰細葉風濤起皎月孤根烟霧時試看往來頻過此與君相對漫敲詩放光松笠庵釋通禮龍鱗夭嬌歲寒枝棲鶴棲雲兩得宜疎影隔窗掛月久清濤滿院聽鐘遲豈無蒼翠存孤𠏉不比柔條逐四時聞說當年光射處至今催我一吟詩放光松乳宗釋興源年年光亦放多時不改青春老更宜僧有雲心堪徙倚鳥無鶴骨漫棲遲凛然獨立氷霜地久矣將騰風雨時應笑葉公難著筆禪房相對好吟詩放光松晏國釋成傳歴盡氷霜不損枝盤桓留我更相宜雲遮鱗影成龍久風作濤聲宿寉遲閃閃有光驚昔日亭亭如葢仰今時素心不厭同朝夕蹋遍空階賦好詩放光松住山釋畹荃夕陽紅碎映疎枝磅礡孤根此際宜一夜狂風龍去遠半空清唳寉歸遲昔年磊落懸珠異今日推敲得句時古𠏉幸無秦氏爵千秋難賦大夫詩將至武彝留別嵩公和尚二首釋元煌暫辭空谷遠一笠事雲遊可似離巢鳥真同不繫舟畏人心已懶避俗意難留更有傷情處臨岐水不流旅况真蕭索杖頭未掛錢半囊惟敝衲一篋是陳編客夢浮雲外鄉心落日前應知重聚首訂在雪梅天拾翠樓落成釋畹荃築室蒼翠間旦暮學老圃披襟向清風斯焉豁眉宇一草與一花奚必擇膏土一椽與一茅便足蔽風雨放眼看雲山千峯如環堵兹樓既落成媿作泉石主心遠林壑殊神凝木石伍道人日無事風月時領取和拾翠樓原韻李暾喜君善叅禪為農復為圃春冬病瘧容今來展眉宇我室一丈地我院一撮土淋漓復連綿見聞苦霪雨君語築樓成千峯如環堵我聞即欲登借為斯樓主雲烟變幻收木石寂靜伍荷香與松濤晨夕各領取和拾翠樓原韻鎮海令張珽育王古招提天然好園圃為訪高僧來一徑通靜宇得瞻舍利光宛遊極樂土綠霏竹外烟翠落松間雨峯巒列作屏花木栽環堵偶來世外閒欣然值賢主我與雲為隣雲與我為伍顧兹紅塵中何物堪與取和拾翠樓原韻黃應熊我署假滃洲亦闢小園圃那得如吾師面山添屋宇爾不慕繁華我𨚫羨淨土晨夕聞鐘魚天花散法雨閣成翠微間詩賦滿四堵幾回喜同登不知誰是主問我索匾額斯樓孰可伍松竹與青山眼前任所取和拾翠樓原韻南皐陳汝登我欲爽塏更玉不積元圃仍近市廛居弗獲新簷宇胡為觀空人切切營樂土創撮清漢樓仰邀天花雨豈於三覺中猶隔墻一堵俯看松放光非樓其誰主為人意良多構成絳雲伍扁舟盍我招風光亟分取和拾翠樓原韻次行李世法未瞻井幹高先知花盈圃讀詩神已馳儼見煥簷宇玉几夙吾愛今更為樂土亟欲往一豋新樓聯舊雨俯臨老龍鱗盤旋翠作堵百尺想斯樓允得其所主天機通禪心靜與青山伍行將避夏長凌空爽共取和拾翠樓原韻時遇陳昌運羨君百尺樓可禪復可圃經年時過訪今來新楹宇我屋近郭西蕞爾小撮土庭竹漸依稀蔬植和風雨堪愛君樓好天然築百堵終宵留此宿竟作斯樓主雲烟襲我身城市罕儔伍晨起挹荷香清芬自領取和拾翠樓原韻近邨錢際盛霉霪老屋傾愁腸結春圃忽聞方外人瓊樓煥紺宇豈真彼西方洵可稱樂土樂土果可求願施法王雨五丁移我家睫時興百堵與君作比隣晨夕迭賔主或與古松參或與秋荷伍何必王粲登作賦始足取和拾翠樓原韻葦昭周式雅入山憇禪林屋外花盈圃遁跡羨高僧數椽築新宇灌園頻汲泉種竹多培土殿角立長松時時作風雨滿目多青山靣靣如環堵我從翁州遊東道遇有主到此萬慮蠲何者堪為伍皓月與清風捨此復何取登拾翠樓李暾讀詩知樓成夢欲一見之今來四靣望高爽深秋時層叠山圍翠陰晴日影移幽尋人各拾自得還自怡老梅𠏉交錯並立墻之傍喜其大寒節能漏新春光欣賞不我負作伴安禪房雪天宜一訪梅頭浮暗香念彼松放光南牖開宜始惜哉一樹遮不獲覽全美奚不亟伐之相對妙無比松亦感知音忽爾濤聲起誰謂樓小小我愛地曠曠四時樹好花心眼獲舒暢嗟余雖老矣時來携短杖蒼翠拾無窮且望身無恙登拾翠樓適黃海門同寅至限韻鄞令鄭大德結伴春遊勝挑燈倡和新山光四面隱月色一宵勻遣興多佳致相逢又故人乘槎天上去島瘦更為隣時海門北上和鄭改之寅長韻黃應熊平日舊遊地今朝雅會新客窗欣唱和春夜話停勻又遇一知己謂姚用周相逢半故人不孤原我輩暫宿亦為隣和前韻錢際盛翠向樓前拾詩從霽後新梅花紅欲謝柳絮綠初勻不覺來吟侶因緣快主人更餘清韻出絕勝竹為隣和前韻陳汝登舌耕荒圃舊春負堇峯新動靜遠分逈窮通氣不勻無緣同彥會徒自作詩人何日生涯足烟霞長結隣和前韻良哉薛泰友春鳥春呼去山樓山更新峯高雲半抹岫遠黛輕勻淺草彌漫谷飛花亂撲人詩題黃鶴上崔顥與誰隣贈拾翠樓主人鄭大德又看名藍新結茅紛紛塵霧已全拋會空寧避三生劫絕跡思棲百尺巢公有詩篇留客盼我無解悟任渠嘲來朝欲別松林去翠影依人雨打包奉和鄭改之寅長原韻黃應熊玉几松前擬結茅翠微收拾莫相拋老梅近喜迎新牖乳燕初來認舊巢現在雲山供去取隨緣風月助吟嘲主人幽雅無他伴魚磬詩瓢一搭包奉和原韻陳汝登嵩公久不顧衡茅我肯輕將拾翠拋一樹松嘗為厦蔭三間樓可作書巢幕天席地飛吾興弄月吟風任世嘲眼底人情看極熟只須學打衲僧包奉和原韻錢際盛不向他方另結茅先人祖席肯輕拋闢開徑作新新屋留彼雲來片片巢珠履棕鞋隨客至春花秋月儘人嘲悟空色相蘧廬裏兩大原從一粟包娑羅閣落成手植花草寄友人釋畹荃戶外烟雲石上苔置身原不染塵埃數莖白髮從他出滿砌閒花任意栽古樹雨餘鶯囀後小樓晴敞燕飛來而今擬結東林社再種池蓮近竹梅娑羅閣䟦進士瀛洲鄭羽逵丁巳三月過阿育王寺訪嵩來上人上人拉余遊娑羅閣葢寺舊有娑羅樹明太守蔡公所植也鄉先達御史林公祖述紀之以碑後寺火樹亦燬焉而碑尚存上人得之亂石中甃碑於堵以閣三楹臨之顏曰娑羅不忘舊也上人屬余求九沙萬太史書其額時太史年七十九余恐不復任筆墨事矣比至武林與太史言之太史曰吾生長甬東未曾遊育王寺今假此題名何幸遂欣然書之嗚呼上人之願為不虚矣娑羅閣記娑羅一名鶴翎四月花開如辛夷大者如牡丹本西域種自佛法流入中國後遂間為中國所有志言中華產娑羅處有三若南浙則天台而台又必於華頂石梁間見之移之他所即槁云非菩薩道塲不可故佛號亦有曰娑羅樹王洵異種也甬東鄮山育王寺明萬癸未郡守蔡公肖兼植娑羅於寺之西偏以寺有佛舍利為晉慧達劉薩訶所卓錫故後寺燬而娑羅久作烟火中物丁巳春嵩來上人得短碣於荒草斷礎間洗剔已嵌諸垣壁建小閣三楹請編修萬公經𨽾三字以存其名而進士鄭君羽逵為之䟦葢與林御史之記後先相輝映矣或語上人曰此去天台不遠何不分華頂石梁之種以續之予曰有閣有記則有娑羅矣夫有生之娑羅有滅無色之娑羅無窮且子不聞乎菩提之庵不必盡植菩提之樹羅漢之殿不必盡栽羅漢之松况有於昔者不必有於今有於心者不必有於目姑以是存其名可也上人歡喜讃歎曰子可謂善言娑羅閣矣請記此以壽諸石寄育王嵩公和尚五首進士悅如謝誾祚玉几山前兩度過緣慳一夕共吟哦不知早有神交意暌隔無嫌廿載多方外論交孰遠公君應蓮社振宗風不嫌靈運塵心在明月追陪笑語中山閣新成十笏居蘆簾棐几閉關如暗香只許梅花入和月挑燈夜讀書虬枝盤曲䕶琳宮鱗甲分明欲化龍一自詩僧吟好句毫端光奪放光松平生車笠苦寥寥𨚫喜空門締世交水淡醴甘俱莫問此中正信漆投膠冐雨遊阿育王寺三首孝亷海若李昌泉𩀱塔蒼茫裏四山雲氣中綠簑人荷鍤短屐客扶笻溪漲添秋雨松濤怒晚風欲圖今日景應喚米南宮靈秀無𩀱地莊嚴不二門方池蓮葉倒古殿劫灰存禮塔披雲影尋碑剝蘚痕鐘魚聲動處僧課肅黃昏偶隨康樂屐來宿贊公房晤靣恨何晚謂嵩上人談心喜欲狂觀詩分佛火趺坐占禪床為聽無生論寒宵覺未長禮塔出山留別嵩來和尚思齊釋實賢十年瞻禮真身塔每念吾師繾綣心慈父不逢當日面使人空寄遠方音雖知好藥心還喜自恨痴兒病已深今日辭師出山去一回顧盼一沉吟贈育王嵩侄和尚南嶽曉堂釋明哲兩三月已作南遊促膝人逢雨後秋碑紀育王燈入史詩裁吳越鳳鳴樓湘雲萬里歸何日玉几千尋望正悠𨚫愧短藜虚過去鴻音蚤待豁𩀱眸春日過訪嵩公和尚二首蘋洲沈瀾幽棲習禪寂鎮日掩松關語妙叅宗鏡詩清似杼山時以吟稾出示川光隨嶺滅梵響入雲閒趺坐依巖磴塵寰窅莫攀湯公堪起病曲盝老唫身軟語耽松壑高風賸㲲巾廵檐梅破臘咒食鳥窺人幽趣憑誰問寒岩只自春秋日寄嵩公二首青岑范核山窗聚首憶當時信宿曾淹兩日期座上數公年正少客中留我句偏遲東臯霧薄連高阜舍利龕明待白眉自笑年年慳一舫聊裁尺素寄相知無書約莫十年交詎忍禪關忘久要夢逐谿山天未曉思縈茶笋月先招黃花紅葉青帘市翠竹蒼松白石橋自媿吾衰非昔比秋深頻望路迢遙唐阿育王寺常住田碑䟦秀水朱𢑱尊唐阿育王寺常住田碑秘書監正字郎萬齊融撰其初趙州刺史徐嶠之書既隳于宼明州刺史于季友于僧惠印所覩舊文邀處士范的重書太和七年冬事也寺建于晉太康二年田賜于宋元嘉二年額更于梁普通三年釋道宣錄神州塔寺以是塔居第一焉碑題越州都督府鄮縣者齊融神龍中與賀知章賀朝張若虚邢巨包融等俱以吳越之士知名見劉晌唐書文苑傳國秀搜玉二集曾載其詩唐書以賀朝萬為一人齊融為一人誤矣唐自武德四年諸州置總管未久更都督府至乾元元年始號越州而鄮縣即故鄞州開元二十六年始割縣置明州齊融撰碑時猶屬越州也碑引詩倬彼甫田歲取十千以甫作碩不知何所本其隂有記則于季友辭附贈范的詩的亦有和韻之作胡氏統籖季氏全唐詩均未之載季友太保頔次子也尚憲宗女惠康公主拜駙馬都尉授羽林將軍制係元稹所草史不言其為明州刺史宰相世系表第書絳宋等州刺史云承恩堂記今上御極之十六年春駕幸江浙以三月初駐蹕杭州既周詢民間疾苦次苐召見文武官僚大典畢行歡心胥洽乃以暇晷遍覽天竺靈隱諸勝翠華所過古剎名僧咸俯伏道左仰覲天顏而吾寧阿育王山住持嵩來荃和尚以奏對稱㫖獨膺殊眷特賜紫袈裟龍縀袍及宮綢綵縀御茶繡袋等物回鑾而後復頒賜御書心經賞賚週叠寵錫無已此今日承恩堂之所由建也予惟一人有慶無論山陬海澨均荷生成即佛侶僧徒罔非皇仁之所沾被阿育王為明州第一叢林自晉太康以迄於今舍利之靈異昭着中外其為福國庇民由來已久無俟縷述矣然其間歲月既久屢有盛衰當宋元時宸翰頻頒帑金時逮士大夫之奉朝命瞻拜敬禮者絡繹不絕而及其既也珠宮貝闕化為刦灰古碣穹碑鞠於茂草當此之時千年佛火不絕如綫孰能恢龍象之力令震旦名山重新碧落迄與普陀天童鼎足而峙且駸駸乎動九重之清問而邀內府之光華乎哉而乃知今此之承恩優渥非惟舍利之靈異昭𡸁閟而必發亦住僧之修持功行有開必先也夫省方問俗意在觀民行慶施惠動遵古制我國家定例自督撫諸大臣而下其得與賜賚者不能多有今以方外山僧膺兹異數其足以賁山川之色而增草木之輝者殆難言罄宜荃公之亟亟焉以承恩為幸特建此堂為佑聖祝嘏地也予讀育王山志見金華黃文獻公所作碑記知元至正間寺僧悟光嘗有承恩閣之建然考其顛末特出上所賜白金幣帛為搆造傑閣之費而上仍設像座下仍為傳宗之堂後仍為方丈之堂其所為承恩者猶槩舉之詞未若此堂專為承恩而建以表其感戴之誠且切也而悟師既經營相度建閣於四百餘年之前荃公復鳩工𩛙材建堂於四百餘年之後祖武孫繩後先濟美其用意又得毋同乎文獻記中有云昔大覺禪師懷璉歸老兹山於其君之賜有所弗受而光獨思所以彰吾君之德一辭讓一恭敬同出於古者之所謂禮夫既同出於禮矣而禮又豈以今古殊乎兹堂之建其信不容已也夫獨愧予以鞅掌荒落之餘無能企文獻如椽之筆而荃公以是見屬不欲重違其請遂詮次其所以建堂之意而歸之至堂之為楹若干以間計者若干高若干脩且廣若干荃公自能載筆而書以遺其嗣法姑不一一贅云乾隆二十年歲次乙亥六月之吉賜進士出身勅授文林郎陝西甘肅平凉府鎮原縣知縣壬申萬壽恩科甘闈鄉試同考官蛟水謝誾祚撰賜進士出身勅授文林郎翰林庶吉士加一級侍直內廷知山東武定府商河縣事己酉科江南鄉試丙辰恩科山東鄉試戊午科山東鄉試同考官鄞范從律篆額乾隆十六年春皇帝南巡至浙三月初五日臣僧持荃於六和塔道左恭迎聖駕龍顏大悅即日內大臣傳㫖召至行宮申刻恩賜紫袈裟一頂內造龍縀袍一襲宮紬兩軸綵縀二端御茶六瓶宮製繡袋一對本年六月十七日寧波府知府臣胡邦祐恭賫御書心經墨寶到山奉㫖賜阿育王寺臣僧持荃即闕謝恩乾隆十九年夏月臣僧持荃恭紀乾隆二十二年今上翠華重幸二月二十七日臣僧持荃同浙省名山住持僧眾在拱辰橋外恭迎聖駕即隨駕進城二十八日午刻同各山住持僧眾到外行宮恭請聖安天顏大喜荷蒙獨喚阿育王寺臣僧名隨即趨前奏應當賜荷包一對初四日辰刻內大臣奉㫖傳臣僧持荃至宮門賜東莞香一盒龍縀宮綢八疋繡袋一對謝恩後即日酉刻忠勇公傅奉㫖傳臣僧持荃至宮門特恩賜紫當即謝恩初六日仍於拱辰橋外送駕回鑾賜紫沙門持荃恭紀承恩堂紀事奉賀嵩公大和尚薛泰友天子西泠駐翠華南宗長老荷褒嘉十年破衲頒宮錦兩腋清風賜鄭茶巽命傳來依佛日心經捧出散天花因營紺宇酬宸眷立石銘恩萬載賒立秋後遊阿育王寺奉贈嵩來禪師宋鑒為借半日閒暫入招提境曲徑藉細草密林礙日影乍疑秋已到微凉生袖領頓使塵襟豁萬緣一時屏偃葢蟠虬龍翠圍插峻嶺中有高僧臥弄筆消日永贈我新製多音響殊清冷山雷雨欲來元談人逾靜移時復喧填延竚發深省戊寅暢月小詩奉贈嵩來大和尚兼續秋水閒房集蔡其發風塵逐逐馬蹄忙偶爾公餘叩上方九峯環浮暮靄一聲鐘冷落斜陽雲深徑曲禪心定山靜僧閒詩思長相與忘形談最劇息機此際即𦏁皇萍逢世外意相深煑茗清談夕永今問我琴堂慙雅化讀公秋水羨高吟松風聲覺三更夢霜月光寒一寸心漫道法門無着處浪花雲片就中尋明州阿育王山續志第十六卷目錄先覺攷補遺舍利懴儀序釋實賢贈荃公和尚住持方丈序黃應熊遊育王寺鄭羽逵嵩公和尚入城李海若孝亷招同人集𩀱桐齋時值新霽限韻全祖望和前韻陳汝登錢塘江候渡寄懷荃上人二首謝德星蘇長公宸奎閣記張無垢妙喜泉銘仆地已久乾隆丁巳冬豎之殿庭釋畹荃題無異堂釋畹荃元雪窗光禪師塔在鄮峯蒙泉之上蹟已冺滅惟荒榛亂石中有斷碣存焉釋畹荃寄懷嵩公和尚謝誾祚寄育王嵩來和尚釋成傳留別荃公上人二首范核寄懷荃和尚謝為雯過育王寺傅德榮請啓萬經重建鐘樓記鄭羽逵同人登阿育王寺鐘樓顧祖訓寄育王嵩和尚釋明訢寄謝嵩來和尚詩箑釋常觀寄懷嵩公和尚集古傅德榮阿育王寺釋宗輝玉几堂看雪釋畹荃題秋水閒房六首釋畹荃寄玉几嵩公六首杜琦
